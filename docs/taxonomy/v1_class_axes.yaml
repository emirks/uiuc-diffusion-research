protocol: outputs/taxonomy/PROTOCOL.md (v1 + pilot amendments)
annotator: claude-sonnet (batches) + fable pilot key cross-check
date: '2026-07-14'
status: AWAITING OWNER VALIDATION
classes:
  air_bending:
    clips_viewed:
    - air_bending_0
    - air_bending_2
    - air_bending_3
    scene_swap: true
    sidedness: two_sided
    mechanism: occlusion
    camera_defining: false
    inserted_content: false
    stylization: false
    subject_anchored: true
    hard_call:
    - sidedness
    - inserted_content
    heterogeneous: false
    sidedness_conflict: false
    notes: 'A voluminous white ribbon of "air"/cotton-like smoke is exhaled from or wells up around the
      subject''s torso, snakes and undulates across the frame substantially covering it (T1: occlusion),
      then clears to reveal an entirely different person in a different location/framing (scene_swap).
      In 2/3 clips a wisp or wind-blown-hair motion still overlaps the just-revealed B subject, so the
      effect visibly touches both sides; the ribbon itself is derived from the subject''s own exhale/aura
      (not ex nihilo), a rare-but-legal occlusion + inserted_content=false pairing. Camera itself stays
      static/fixed the whole time despite the "bending" name.

      '
  animalization:
    clips_viewed:
    - animalization_0
    - animalization_4
    - animalization_7
    scene_swap: false
    sidedness: A_only
    mechanism: morph
    camera_defining: false
    inserted_content: true
    stylization: false
    subject_anchored: true
    hard_call:
    - sidedness
    - inserted_content
    heterogeneous: false
    sidedness_conflict: false
    notes: 'Fixed camera, same backdrop/location throughout (blue studio, grass field, red studio). A
      thin glowing energy ring/spark burst (ex-nihilo, not derived from either endpoint) briefly surrounds
      the subject while their body continuously re-renders in place into an animal (dog / panda / tiger)
      holding the same pose; the ring/sparks fade out before the animal settles into its own several-frame
      independent motion (walking/sniffing), so no residual effect persists into the stabilized B state.

      '
  color_rain:
    clips_viewed:
    - color_rain_0
    - color_rain_5
    - color_rain_8
    scene_swap: false
    sidedness: A_only
    mechanism: morph
    camera_defining: false
    inserted_content: true
    stylization: true
    subject_anchored: false
    hard_call:
    - mechanism
    - stylization
    heterogeneous: true
    per_clip:
      color_rain_5:
        stylization: false
    sidedness_conflict: false
    notes: 'Colored liquid (blood-red, teal paint, dark paint) pours from off-frame and progressively
      drenches the subject in place. In 2 of 3 clips (color_rain_0, color_rain_8) the whole surrounding
      scene also takes on a matching color-grade by the end; color_rain_5 stays localized to the person,
      with the sky/grass never tinted.

      '
  cotton_cloud:
    clips_viewed:
    - cotton_cloud_0
    - cotton_cloud_4
    - cotton_cloud_8
    scene_swap: false
    sidedness: A_only
    mechanism: morph
    camera_defining: false
    inserted_content: true
    stylization: false
    subject_anchored: false
    hard_call:
    - mechanism
    heterogeneous: false
    sidedness_conflict: false
    notes: 'Subject holds the same pose/framing for the entire clip (parking garage, city street, office);
      fluffy pink cotton-candy-like cloud matter grows ex nihilo from the surrounding environment/background
      (never touching or emanating from the subject''s body) and progressively fills more of the frame
      around them. Same shot, no cut, continuous in-place accumulation — treated as morph per the color_rain
      precedent (state accumulation, not a "reveal from behind" occlusion, since the subject in the foreground
      is never obscured).

      '
  display_transition:
    clips_viewed:
    - display_transition_1
    - display_transition_2
    - display_transition_3
    scene_swap: true
    sidedness: two_sided
    mechanism: occlusion
    camera_defining: true
    inserted_content: true
    stylization: false
    subject_anchored: false
    hard_call:
    - mechanism
    heterogeneous: false
    sidedness_conflict: false
    notes: 'A crew member holds up an external camera/monitor screen showing a preview of destination
      B; the screen is pushed/zoomed toward camera until it substantially covers the frame (T1: occlusion
      wins over traversal even though camera work carries the push). In the frames leading up to full
      reveal, the live environment visible around the screen''s edges has already cut to B''s location
      while the screen itself still shows the preview, so the effect visibly bridges both A''s and B''s
      frames. The monitor/rig is inserted, content-agnostic apparatus operated by a third party, not attached
      to the subject being photographed.

      '
  earth_element:
    clips_viewed:
    - earth_element_0
    - earth_element_3
    - earth_element_6
    scene_swap: false
    sidedness: A_only
    mechanism: morph
    camera_defining: false
    inserted_content: true
    stylization: false
    subject_anchored: true
    hard_call:
    - sidedness
    - mechanism
    - scene_swap
    heterogeneous: true
    per_clip:
      earth_element_6:
        scene_swap: true
        sidedness: two_sided
        mechanism: occlusion
    sidedness_conflict: true
    notes: 'earth_element_0/3: in-place transformation only — same room/desert canyon the entire clip,
      subject''s body progressively cracks into a rock/stone texture with glowing lightning-like veins
      (and, in one clip, ground fire at the feet), never leaving the original location (matches manifest
      onesided). earth_element_6 is a clear outlier: a dirt/sand mass grows from the subject and swells
      to substantially occlude the entire frame for several consecutive tiles, revealing a wholly different
      person in a different location (library aisle -> stairwell) with the new environment already visible
      behind the dirt before the clean reveal — flagging sidedness_conflict since this per-clip two_sided/occlusion/scene_swap
      finding disagrees with both the class default and the manifest''s onesided label.

      '
  earth_wave:
    clips_viewed:
    - earth_wave_0
    - earth_wave_2
    - earth_wave_4
    scene_swap: false
    sidedness: A_only
    mechanism: morph
    camera_defining: false
    inserted_content: false
    stylization: false
    subject_anchored: true
    hard_call:
    - sidedness
    - mechanism
    - scene_swap
    heterogeneous: true
    per_clip:
      earth_wave_4:
        scene_swap: true
        sidedness: two_sided
        mechanism: occlusion
        inserted_content: true
    sidedness_conflict: true
    notes: 'earth_wave_0/2: in-place transformation — same terrain/canyon for the whole clip; a swirling
      dust/sand wave wraps the subject''s hands and body as bending gestures accompany a progressive rock-texture
      transformation, no location change (majority read is A_only, disagreeing with the manifest''s twosided
      class label — flagging sidedness_conflict at the class level regardless of the per-clip split).
      earth_wave_4 is the outlier, structurally identical to earth_element_6: dust/rubble floods and substantially
      occludes the whole frame, then reveals a person in a completely different room; a faint dust speck
      lingers into the first calm B frame.

      '
  fire_element:
    clips_viewed:
    - fire_element_0
    - fire_element_2
    - fire_element_4
    scene_swap: false
    sidedness: A_only
    mechanism: morph
    camera_defining: false
    inserted_content: true
    stylization: false
    subject_anchored: true
    hard_call:
    - inserted_content
    heterogeneous: false
    sidedness_conflict: false
    notes: 'Same static/posed shot for the entire clip (field at dusk, black sand beach, burning field)
      — no scene_swap, no location change and no second person revealed. Glowing lava-crack texture progressively
      spreads across the subject''s body until they are a full molten/lava humanoid; in 2/3 clips a flame
      trail/projectile also appears at the hand as they gesture. Contrast with firelava (below), whose
      near-identical crack/lava visual look does relocate the subject — the name alone does not disambiguate
      these two classes; the frames do.

      '
  firelava:
    clips_viewed:
    - firelava_0
    - firelava_3
    - firelava_5
    scene_swap: true
    sidedness: two_sided
    mechanism: occlusion
    camera_defining: true
    inserted_content: false
    stylization: false
    subject_anchored: true
    hard_call:
    - mechanism
    - camera_defining
    heterogeneous: false
    sidedness_conflict: false
    notes: 'The subject''s own body erupts into fire (self-derived, same logic as shadow_smoke''s subject-emanated
      smoke — not ex nihilo), which substantially covers their silhouette (T1: occlusion) while a continuously-tracked
      shot follows them running/walking/falling; the real environment visibly changes during this covered
      motion in all 3 clips (gas station -> street, snow slope -> grass field, rooftop pole -> street
      plaza), and a faint residual flame patch lingers into the first calm B frame in each case, confirming
      two_sided (matches manifest). Deliberate tracking/whip camera work following the moving flame figure
      is part of the effect''s identity.

      '
  flame:
    clips_viewed:
    - flame_transition_0
    - flame_transition_1
    scene_swap: true
    sidedness: two_sided
    mechanism: occlusion
    camera_defining: false
    inserted_content: false
    stylization: false
    subject_anchored: true
    hard_call:
    - inserted_content
    heterogeneous: false
    sidedness_conflict: false
    notes: subject catches fire at the body, flame grows to a full-frame whiteout (occlusion), recedes
      off a different subject at a different set revealing B; matches manifest twosided.
  flying_cam_transition:
    clips_viewed:

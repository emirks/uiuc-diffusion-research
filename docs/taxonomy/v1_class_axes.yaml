  melt_transition:
    clips_viewed:
    - melt_transition_1
    - melt_transition_3
    - melt_transition_4
    scene_swap: true
    sidedness: two_sided
    mechanism: occlusion
    camera_defining: false
    inserted_content: false
    stylization: false
    subject_anchored: true
    hard_call:
    - mechanism
    heterogeneous: true
    sidedness_conflict: false
    per_clip:
      melt_transition_3:
        mechanism: dressed_cut
        inserted_content: true
        notes: yellow-then-black liquid paint drips down her sleeve while still at the same fruit-market
          location (never fills the frame, market backdrop stays visible); the actual scene-swap to the
          park is a hard cut dressed with a matching black-liquid puddle carried over into the first park
          frame, and unlike clips 1/4 the paint has no visible source prop (ex nihilo, not derived) --
          satisfies the dressed_cut/inserted_content consistency rule.
    notes: liquid/melt substance derived from a held prop (lasso rope, ice cream) grows to cover most
      of the frame (occlusion) and a trace of it persists into the first reveal frames of the new scene/outfit
      (two_sided), matching manifest twosided; clip_3 instead reads as a dressed cut (see per_clip).
  money_rain:
    clips_viewed:
    - money_rain_0
    - money_rain_3
    - money_rain_7
    scene_swap: false
    sidedness: A_only
    mechanism: morph
    camera_defining: false
    inserted_content: true
    stylization: false
    subject_anchored: false
    hard_call:
    - sidedness
    heterogeneous: false
    sidedness_conflict: false
    notes: 'Same continuous shot in all 3 (rooftop smoker, boat interior, sidewalk gunman); no cut, no
      location change. Bills fall from off-frame starting roughly a third into the clip and progressively
      accumulate, absent in the first tiles and heaviest/piled by the last — a "drenched" in-place state
      accumulation (matches the scene_swap=no parenthetical example), so it reads A_only under the single-reference-scene
      convention even though the visible money is concentrated toward the later tiles; agrees with manifest
      onesided. Money is content-agnostic (would rain on any scene) and not derived from any endpoint
      entity, so inserted_content=true, subject_anchored =false.

      '
  monstrosity:
    clips_viewed:
    - monstrosity_0
    - monstrosity_1
    - monstrosity_2
    scene_swap: false
    sidedness: A_only
    mechanism: morph
    camera_defining: false
    inserted_content: true
    stylization: false
    subject_anchored: false
    hard_call:
    - mechanism
    - sidedness
    heterogeneous: false
    sidedness_conflict: false
    notes: 'Static camera, static subject, same backdrop the whole clip (tundra, night beach, highway
      overpass); a giant horned/eyed creature grows in the background over time. The subject stays fully
      unoccluded in the foreground throughout — nothing is ever revealed "from behind" the creature, so
      this is treated as background state-accumulation (morph) rather than occlusion. Creature is a new
      entity, not a transformation of the subject or scene geometry, so inserted_content=true; it manifests
      regardless of who is standing there, so subject_anchored=false.

      '
  mystification:
    clips_viewed:
    - mystification_0
    - mystification_3
    - mystification_5
    scene_swap: false
    sidedness: A_only
    mechanism: morph
    camera_defining: false
    inserted_content: false
    stylization: false
    subject_anchored: true
    hard_call:
    - sidedness
    heterogeneous: false
    sidedness_conflict: false
    notes: 'Same static shot throughout (studio chair, convenience store, desert roadside fence); the
      subject dissolves into colored smoke/dust in place (gold, blue, teal) and is entirely gone by the
      last tile, leaving the persistent background empty — an exact match for the scene_swap=no "subject
      removed" example. Smoke visibly originates from the subject''s own body (a gas form), so per protocol
      this is NOT inserted_content, and it is clearly subject_anchored (the effect requires and attaches
      to that specific figure).

      '
  nature_bloom:
    clips_viewed:
    - nature_bloom_0
    - nature_bloom_2
    scene_swap: false
    sidedness: A_only
    mechanism: morph
    camera_defining: false
    inserted_content: true
    stylization: false
    subject_anchored: false
    hard_call:
    - sidedness
    - camera_defining
    heterogeneous: false
    sidedness_conflict: false
    notes: 'Same static portrait framing throughout (car back seat, both clips); flowers/foliage progressively
      grow into the background over the clip, absent at the start and filling much of the frame by the
      end, with the subject''s pose/wardrobe unchanged — a petals- style ex-nihilo insertion (inserted_content=true)
      that would grow into any backdrop (subject_anchored=false). No deliberate whip/ orbit/push identified;
      any apparent size change is marginal and not a defining camera move.

      '
  plasma_explosion:
    clips_viewed:
    - plasma_explosion_0
    - plasma_explosion_2
    - plasma_explosion_4
    scene_swap: false
    sidedness: A_only
    mechanism: occlusion
    camera_defining: true
    inserted_content: false
    stylization: false
    subject_anchored: true
    hard_call:
    - scene_swap
    - inserted_content
    heterogeneous: false
    sidedness_conflict: false
    notes: 'Subject''s eyes/head emit an upward beam of light that swells into an explosion cloud, while
      the camera simultaneously pulls back/ zooms out hard (heavy motion blur on street/traffic) — structurally
      identical to the protocol''s gas_transformation compound: the handoff frame ends up substantially
      covered by the cloud, so T1 gives occlusion despite the camera flying (camera_defining=true, "portal"
      pattern). Last tile in all 3 clips is a total whiteout with no scene content legible, read as the
      same shot "emptied" (scene_swap=no) rather than a confirmed cut to a new location. Beam originates
      at the subject''s face (luminous_gaze-style), so subject_anchored=true and inserted_content=false
      (energy transforms out of the subject rather than entering ex nihilo).

      '
  polygon:
    clips_viewed:
    - polygon_0
    - polygon_4
    - polygon_8
    scene_swap: false
    sidedness: A_only
    mechanism: traversal
    camera_defining: true
    inserted_content: false
    stylization: true
    subject_anchored: false
    hard_call:
    - mechanism
    - camera_defining
    - stylization
    - subject_anchored
    heterogeneous: true
    per_clip:
      polygon_8:
        mechanism: morph
        camera_defining: false
        stylization: false
        subject_anchored: true
    sidedness_conflict: false
    notes: 'polygon_0/polygon_4 (majority): subject holds a fixed pose while the camera visibly reorients
      around them (different building facades/architecture come into view across the tiles) as the entire
      frame — subject and background alike — restyles from photo to a white/pale low-poly wireframe render;
      real scene content (simplified) stays visible through the move, so mechanism=traversal with camera_defining=true,
      and the frame-wide restyle is stylization=true, content-agnostic (subject_anchored=false). polygon_8
      is a genuine outlier: a tight face/hand crop against a static wood-panel wall that never changes
      — no camera movement, and only the subject (head, hair, hand) converts to polygon mesh while the
      background stays fully photographic the whole clip, so it is localized (stylization=false per "localized
      effect however dramatic = no"), continuous in-place decomposition with real background visible throughout
      (morph), and specifically targets the subject while sparing the environment (subject_anchored=true).
      scene_swap/sidedness/inserted_content are consistent across all 3 (no scene cut anywhere; restyle
      only, nothing ex nihilo).

      '
  portal:
    clips_viewed:
    - portal_0
    - portal_2
    - portal_9
    scene_swap: false
    sidedness: A_only
    mechanism: occlusion
    camera_defining: false
    inserted_content: true
    stylization: false
    subject_anchored: true
    hard_call:
    - sidedness
    - subject_anchored
    heterogeneous: false
    sidedness_conflict: false
    notes: 'A green swirling portal opens right at the subject''s position, grows to substantially cover
      the frame, and the subject is pulled through it; the portal then shrinks and vanishes, leaving the
      same location empty. The camera itself never moves (fixed shot) despite the "portal" name.

      '
  raven_transition:
    clips_viewed:
    - raven_transition_0
    - raven_transition_2
    - raven_transition_3
    scene_swap: true
    sidedness: two_sided
    mechanism: occlusion
    camera_defining: true
    inserted_content: true
    stylization: false
    subject_anchored: false
    hard_call:
    - subject_anchored
    heterogeneous: false
    sidedness_conflict: false
    notes: 'A flock of ravens/crows erupts and thickens into a substantially covering wall (T1: occlusion)
      while the departure scene''s background is still visible through/around the birds, and stray birds
      are still present as the arrival scene''s background becomes visible before fully clearing — effect
      activity spans both sides, matching manifest twosided. Every exemplar ends in a wholly different
      location with a different outfit and hairstyle (dark studio -> stone courtyard; tree/fog field ->
      rooftop ledge; roadside silhouette -> sunset wheat field), a clean scene_swap=yes. Motion-blurred,
      directional camera work through the flock is consistent across all 3, so camera_defining=true. Birds
      are a textbook ex-nihilo insertion (inserted_content=true, the protocol''s own example); treated
      as a generic occlusion device rather than something anchored to the specific subject (subject_anchored=false).

      '
  run_set_on_fire:

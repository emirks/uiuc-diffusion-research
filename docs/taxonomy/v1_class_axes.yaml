          reveal as the other two exemplars -- disagrees with manifest onesided.
  luminous_gaze:
    clips_viewed:
    - luminous_gaze_0
    - luminous_gaze_2
    - luminous_gaze_3
    scene_swap: false
    sidedness: A_only
    mechanism: morph
    camera_defining: false
    inserted_content: true
    stylization: true
    subject_anchored: true
    hard_call:
    - inserted_content
    heterogeneous: false
    sidedness_conflict: false

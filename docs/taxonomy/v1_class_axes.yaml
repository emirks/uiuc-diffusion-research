    - mechanism
    - inserted_content
    heterogeneous: true
    sidedness_conflict: true
    per_clip:
      flying_cam_transition_1:
        sidedness: two_sided
        mechanism: traversal
        inserted_content: true
        notes: an archway materializes ex nihilo in desert sand; camera+subject walk continuously through
          the real threshold into a lit house interior, then keep pushing/zooming onto a new subject on
          the rug (real content visible throughout, no frame-wide occlusion).
      flying_cam_transition_3:
        sidedness: A_only
        mechanism: occlusion
        inserted_content: false
        sidedness_conflict: true
        notes: camera flies alongside a jet, closing to a canopy/helmet fill-frame blackout (T1); the
          B side (soldiers on a hillside) is a static long-take reveal with no further effect activity
          -- disagrees with manifest twosided.
      flying_cam_transition_4:
        sidedness: two_sided
        mechanism: occlusion
        inserted_content: false
        notes: the subject's own fan sweeps through frame to a fill-frame motion-blur (T1) while the camera
          keeps flying/pushing forward continuously through the reveal all the way to a close-up of subject
          B.
  gas_transformation:
    clips_viewed:
    - gas_transformation_0
    - gas_transformation_5
    - gas_transformation_9
    scene_swap: false
    sidedness: A_only
    mechanism: morph
    camera_defining: false
    inserted_content: false
    stylization: false
    subject_anchored: true
    hard_call: []
    heterogeneous: false
    sidedness_conflict: false
    notes: 'The subject''s own body dissolves in place into smoke/gas (or smoke+fire) while the surrounding
      scene (elevator, rooftop, plaza) stays visible throughout, not covered; the cloud then disperses,
      leaving the same location empty of the subject.

      '
  giant_grab:
    clips_viewed:
    - giant_grab_0
    - giant_grab_2
    - giant_grab_4
    scene_swap: false
    sidedness: two_sided
    mechanism: morph
    camera_defining: false
    inserted_content: true
    stylization: false
    subject_anchored: true
    hard_call:
    - mechanism
    - inserted_content
    heterogeneous: false
    sidedness_conflict: true
    notes: 'An oversized hand enters from off-frame, grips the endpoint subject (dog, man, or woman) directly,
      and drags/lifts them out of frame, leaving the same location empty. The hand itself stays on screen
      through the very last frame (ending on a peace-sign gesture), so the effect visibly touches the
      arrival side too, not just the departure — flagging for owner review since any B-touching finding
      is instrument-critical.

      '
  hero_flight:
    clips_viewed:
    - hero_flight_0
    - hero_flight_5
    - hero_flight_9
    scene_swap: true
    sidedness: two_sided
    mechanism: traversal
    camera_defining: true
    inserted_content: false
    stylization: false
    subject_anchored: true

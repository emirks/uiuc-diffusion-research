      flight; the flying subject/fist-forward POV persists to the final frame in all 3 exemplars, so B's
      frames are also effect-altered -- conflicts with manifest onesided.
  hole_transition:
    clips_viewed:
    - hole_transition_0
    - hole_transition_1
    scene_swap: true
    sidedness: A_only
    mechanism: occlusion
    camera_defining: true
    inserted_content: true
    stylization: false
    subject_anchored: false
    hard_call:
    - sidedness
    heterogeneous: false
    sidedness_conflict: true
    notes: large ring-shaped object (tire / wall mirror) appears only in A's environment; camera zooms
      through its hole to reveal an entirely different B scene/subject with no ring residue on the B side.
  illustration_scene:
    clips_viewed:
    - illustration_scene_0
    - illustration_scene_5
    - illustration_scene_9
    scene_swap: false
    sidedness: A_only
    mechanism: morph
    camera_defining: false
    inserted_content: false
    stylization: true
    subject_anchored: false
    hard_call: []
    heterogeneous: false
    sidedness_conflict: false
    notes: 'A static photo (same pose, same framing/walk-cycle) progressively re-renders in place from
      photorealistic into flat illustrated/pop-art line-art and color-block style; nothing is added or
      removed, it''s a frame-wide restyle that never reverts.

      '
  jump_transition:
    clips_viewed:
    - jump_transition_1
    scene_swap: true
    sidedness: two_sided
    mechanism: traversal

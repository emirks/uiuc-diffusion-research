# Reproducible environment for diffusion research (PyTorch, Diffusers, LTX-2, etc.)
name: diffusion
channels:
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - pip:
      # PyTorch (CUDA 12.1)
      - torch==2.5.1+cu121
      - torchvision==0.20.1+cu121
      - torchaudio==2.5.1+cu121
      # NVIDIA CUDA libs (match torch 2.5.1)
      - nvidia-cublas-cu12==12.1.3.1
      - nvidia-cuda-cupti-cu12==12.1.105
      - nvidia-cuda-nvrtc-cu12==12.1.105
      - nvidia-cuda-runtime-cu12==12.1.105
      - nvidia-cudnn-cu12==9.1.0.70
      - nvidia-cufft-cu12==11.0.2.54
      - nvidia-curand-cu12==10.3.2.106
      - nvidia-cusolver-cu12==11.4.5.107
      - nvidia-cusparse-cu12==12.1.0.106
      - nvidia-nccl-cu12==2.21.5
      - nvidia-nvshmem-cu12==3.3.20
      - nvidia-nvtx-cu12==12.1.105
      - triton==3.1.0
      - sympy==1.13.1
      # Diffusion / Hugging Face
      - diffusers==0.36.0
      - transformers==4.57.3
      - accelerate==1.12.0
      - safetensors==0.7.0
      - huggingface-hub>=0.34.0
      # Core scientific
      - numpy>=2.0,<3
      - scipy>=1.14
      - pillow>=10
      - matplotlib>=3.8
      - pyyaml>=6.0
      - tqdm>=4.65
      # Video / LTX-2
      - av>=16.0
      - einops>=0.8
      # Vision (one OpenCV is enough)
      - opencv-python>=4.8
      - timm>=1.0
      # Experiment / training
      - wandb>=0.23
      - pytest>=9.0

model:
  model_path: /projects/illinois/eng/cs/jrehg/users/emirkisa/cache/huggingface/ltx2_models/ltx-2-19b-dev.safetensors
  text_encoder_path: /projects/illinois/eng/cs/jrehg/users/emirkisa/cache/huggingface/gemma/gemma-3-12b-it-qat-q4_0-unquantized
  training_mode: lora
  load_checkpoint: /projects/illinois/eng/cs/jrehg/users/emirkisa/diffusion-research/outputs/training/exp_077_synth_stratum/synth_smoke/checkpoints
lora:
  rank: 32
  alpha: 32
  dropout: 0.0
  target_modules:
  - attn1.to_k
  - attn1.to_q
  - attn1.to_v
  - attn1.to_out.0
  - attn2.to_k
  - attn2.to_q
  - attn2.to_v
  - attn2.to_out.0
  - ff.net.0.proj
  - ff.net.2
training_strategy:
  name: flexible
  video:
    is_generated: true
    latents_dir: latents
    conditions:
    - type: reference
      latents_dir: reference_latents
      probability: 1.0
    - type: mask
      mask_dir: masks
      probability: 1.0
    cond_clean_latents_dir: cond_clean_latents
optimization:
  learning_rate: 0.0002
  steps: 50
  batch_size: 1
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  optimizer_type: adamw
  scheduler_type: linear
  scheduler_params: {}
  enable_gradient_checkpointing: true
acceleration:
  mixed_precision_mode: bf16
  quantization: null
  load_text_encoder_in_8bit: false
  offload_optimizer_during_validation: false
data:
  preprocessed_data_root: /projects/illinois/eng/cs/jrehg/users/emirkisa/diffusion-research/outputs/videos/exp_077_synth_stratum/run_0001/dataset/roots/synth_smoke
  num_dataloader_workers: 2
validation:
  samples: []
  negative_prompt: worst quality, inconsistent motion, distorted, jittery
  video_dims:
  - 480
  - 640
  - 121
  frame_rate: 24.0
  seed: 42
  inference_steps: 30
  interval: null
  guidance_scale: 4.0
  stg_scale: 1.0
  stg_blocks:
  - 29
  stg_mode: stg_v
  generate_video: false
  generate_audio: false
  skip_initial_validation: true
checkpoints:
  interval: 50
  keep_last_n: -1
  precision: bfloat16
  no_resume: false
flow_matching:
  timestep_sampling_mode: shifted_logit_normal
  timestep_sampling_params: {}
hub:
  push_to_hub: false
  hub_model_id: null
wandb:
  enabled: false
  project: exp077_synth_stratum
  entity: null
  tags:
  - ltx2
  - exp077
  - smoke
  - ic_gen
  log_validation_videos: false
seed: 42
output_dir: /projects/illinois/eng/cs/jrehg/users/emirkisa/diffusion-research/outputs/training/exp_077_synth_stratum/synth_smoke

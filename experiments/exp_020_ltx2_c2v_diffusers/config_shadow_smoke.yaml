# exp_020 — production C2V baseline on the shadow_smoke transition clips.
#
# Purpose: the "completely unaffected" LTX-2 C2V reference for the feature-
# injection work (exp_040/041). Vanilla two-stage generation from FRESH noise
# (no inversion, no injection, no drop1) — what LTX-2 invents for each
# transition given only the endpoint clips. This is the off-manifold regime
# the injection is meant to improve on.
#
# Each shadow_smoke clip supplies BOTH conditioning ends: start = first
# num_clip_frames, end = last num_clip_frames (start_clip == end_clip).
# guidance_scale = 3.2 to match the edit-pass CFG used in exp_041.

model:
  model_id: "Lightricks/LTX-2"
  distilled_lora_strength: 1.0

samples:
  - sample_id: "shadow_smoke_4"
    class: "transition_shadow_smoke"
    start_clip: "data/processed/transitions/shadow_smoke/shadow_smoke_4.mp4"
    end_clip:   "data/processed/transitions/shadow_smoke/shadow_smoke_4.mp4"
    prompt: "A floating black smoke transition between objects."
  - sample_id: "shadow_smoke_8"
    class: "transition_shadow_smoke"
    start_clip: "data/processed/transitions/shadow_smoke/shadow_smoke_8.mp4"
    end_clip:   "data/processed/transitions/shadow_smoke/shadow_smoke_8.mp4"
    prompt: "A floating black smoke transition between objects."
  - sample_id: "shadow_smoke_0"
    class: "transition_shadow_smoke"
    start_clip: "data/processed/transitions/shadow_smoke/shadow_smoke.mp4"
    end_clip:   "data/processed/transitions/shadow_smoke/shadow_smoke.mp4"
    prompt: "A floating black smoke transition between objects."

inputs:
  num_clip_frames: 25
  start_clip_strength: 1.0
  end_clip_strength: 1.0
  negative_prompt: "blurry, distorted, low quality."

inference:
  height: 512
  width: 768
  num_frames: 121
  frame_rate: 24.0
  num_inference_steps: 40
  guidance_scale: 3.2          # match exp_041 edit-pass CFG

runtime:
  seed: 42

outputs:
  dir: "outputs/videos/exp_020_ltx2_c2v_diffusers"

model:
  repo_id: "Lightricks/LTX-2"
  torch_dtype: "bfloat16"
  # Point HF cache to workspace to avoid filling system disk
  hf_cache_dir: "/workspace/cache/huggingface/hub"
  # Load the transformer in fp8 to halve VRAM usage (weights stored as fp8_e4m3fn).
  # Set to false to fall back to the standard bfloat16 transformer.
  use_fp8: true
  fp8_weight_name: "ltx-2-19b-dev-fp8.safetensors"

inputs:
  # First frame from exp_013 vc-bench-flf clip
  image: "data/processed/vc-bench-flf/first_last_frames/Actions_Activities_action_action_1581362_2562x1440_b27b9c451a/first.png"
  prompt: >
    A person performs a dynamic physical action outdoors. The scene transitions
    smoothly from the opening pose through natural motion, with stable camera,
    coherent lighting, and realistic movement. Cinematic framing, clean details.
  negative_prompt: >
    shaky, glitchy, blurry, out of focus, overexposed, underexposed, low contrast,
    washed out colors, excessive noise, grainy texture, poor lighting, flickering,
    motion blur, distorted proportions, unnatural skin tones, deformed facial features,
    missing facial features, extra limbs, disfigured hands, wrong hand count,
    inconsistent perspective, camera shake, color banding, cartoonish rendering,
    3D CGI look, unrealistic materials, uncanny valley effect, AI artifacts,
    low quality, worst quality, deformed, distorted, disfigured, motion smear,
    motion artifacts, fused fingers, bad anatomy, weird hand, ugly, transition, static.

inference:
  height: 512          # must be divisible by 32
  width: 768           # must be divisible by 32
  num_frames: 121      # must satisfy: (num_frames - 1) % 8 == 0  →  8*15+1
  frame_rate: 24.0

  # Stage 1 — full model, non-distilled
  stage1_num_inference_steps: 40
  stage1_guidance_scale: 4.0

  # Stage 2 — distilled LoRA refinement (3 steps, CFG=1)
  stage2_lora_weight: "ltx-2-19b-distilled-lora-384.safetensors"
  stage2_lora_strength: 1.0
  stage2_num_inference_steps: 3
  stage2_guidance_scale: 1.0

  decode_timestep: 0.05
  decode_noise_scale: 0.025

runtime:
  seed: 42
  device: "cuda"

memory:
  # Sequential CPU offload — moves each sub-module to GPU one at a time (minimal VRAM)
  enable_sequential_cpu_offload: true
  # VAE tiling — avoids OOM on large decodes
  enable_vae_tiling: true

outputs:
  dir: "outputs/videos/exp_014_ltx2_i2v_diffusers"

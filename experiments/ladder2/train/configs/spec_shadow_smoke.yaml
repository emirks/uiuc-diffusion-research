model:
  model_path: /projects/illinois/eng/cs/jrehg/users/emirkisa/cache/huggingface/ltx2_models/ltx-2-19b-dev.safetensors
  text_encoder_path: /projects/illinois/eng/cs/jrehg/users/emirkisa/cache/huggingface/gemma/gemma-3-12b-it-qat-q4_0-unquantized
  training_mode: lora
  load_checkpoint: /projects/illinois/eng/cs/jrehg/users/emirkisa/diffusion-research/outputs/training/ladder2/spec_shadow_smoke/checkpoints
lora:
  rank: 32
  alpha: 32
  dropout: 0.0
  target_modules:
  - attn1.to_k
  - attn1.to_q
  - attn1.to_v
  - attn1.to_out.0
  - attn2.to_k
  - attn2.to_q
  - attn2.to_v
  - attn2.to_out.0
training_strategy:
  name: flexible
  video:
    is_generated: true
    latents_dir: latents
    conditions:
    - type: prefix
      temporal_boundary: 2
      probability: 1.0
    - type: suffix
      temporal_boundary: 1
      probability: 1.0
    cond_clean_latents_dir: cond_clean_latents
optimization:
  learning_rate: 0.0001
  steps: 2000
  batch_size: 1
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  optimizer_type: adamw
  scheduler_type: linear
  scheduler_params: {}
  enable_gradient_checkpointing: true
acceleration:
  mixed_precision_mode: bf16
  quantization: null
  load_text_encoder_in_8bit: false
  offload_optimizer_during_validation: false
data:
  preprocessed_data_root: /projects/illinois/eng/cs/jrehg/users/emirkisa/diffusion-research/experiments/ladder2/dataset/roots/spec_shadow_smoke
  num_dataloader_workers: 2
validation:
  samples:
  - prompt: An older man in a flowing white traditional robe and a black hat rollerblades across a city crosswalk with cars and a pagoda-roofed building behind him. sksz. a blond man in a navy suit and sunglasses carrying a briefcase while riding a skateboard down a suburban hill past stone steps and a green lawn.
    conditions:
    - type: prefix
      video: /projects/illinois/eng/cs/jrehg/users/emirkisa/diffusion-research/experiments/ladder2/conds/shadow_smoke_1_start9.mp4
      num_frames: 9
    - type: suffix
      video: /projects/illinois/eng/cs/jrehg/users/emirkisa/diffusion-research/experiments/ladder2/conds/shadow_smoke_1_end9.mp4
      num_frames: 8
  - prompt: A young woman with dark space buns and wispy bangs, purple-tinted sunglasses, and a gray ribbed collared sweater takes a mirror selfie with a sticker-covered phone while flashing a peace sign against a plain beige wall. sksz. a pale woman with a tousled black bob and winged eyeliner in a black cutout halter top, biting the fingertip of her long black latex glove beside a bright curtained window.
    conditions:
    - type: prefix
      video: /projects/illinois/eng/cs/jrehg/users/emirkisa/diffusion-research/experiments/ladder2/conds/air_bending_0_start9.mp4
      num_frames: 9
    - type: suffix
      video: /projects/illinois/eng/cs/jrehg/users/emirkisa/diffusion-research/experiments/ladder2/conds/air_bending_0_end9.mp4
      num_frames: 8
  - prompt: An older man in a flowing white traditional robe and a black hat rollerblades across a city crosswalk with cars and a pagoda-roofed building behind him.
  negative_prompt: worst quality, inconsistent motion, distorted, jittery
  video_dims:
  - 480
  - 640
  - 121
  frame_rate: 24.0
  seed: 42
  inference_steps: 30
  interval: 250
  guidance_scale: 4.0
  stg_scale: 1.0
  stg_blocks:
  - 29
  stg_mode: stg_v
  generate_audio: false
  skip_initial_validation: false
checkpoints:
  interval: 250
  keep_last_n: -1
  precision: bfloat16
  no_resume: false
flow_matching:
  timestep_sampling_mode: shifted_logit_normal
  timestep_sampling_params: {}
hub:
  push_to_hub: false
  hub_model_id: null
wandb:
  enabled: true
  project: ladder2
  entity: null
  tags:
  - ltx2
  - ladder2
  - specialist
  - shadow_smoke
  - twosided
  log_validation_videos: true
seed: 42
output_dir: /projects/illinois/eng/cs/jrehg/users/emirkisa/diffusion-research/outputs/training/ladder2/spec_shadow_smoke

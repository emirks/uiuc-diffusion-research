model:
  checkpoint_path: "/workspace/cache/huggingface/hub/models--Lightricks--LTX-2/snapshots/47da56e2ad66ce4125a9922b4a8826bf407f9d0a/ltx-2-19b-dev.safetensors"
  distilled_lora_path: "/workspace/cache/huggingface/ltx2_models/ltx-2-19b-distilled-lora-384.safetensors"
  distilled_lora_strength: 0.6
  spatial_upsampler_path: "/workspace/cache/huggingface/ltx2_models/ltx-2-spatial-upscaler-x2-1.0.safetensors"
  gemma_root: "/workspace/cache/huggingface/gemma/gemma-3-12b-it-qat-q4_0-unquantized"

# DAVIS image-dir pairs for C2V transition evaluation.
# start_images: first frames of the source sequence (from_end=False).
# end_images:   last frames of the target sequence (from_end=True).
#
# Easy pairs (high optical-flow similarity — test smooth continuity):
#   davis_camel_to_horsejump  : large-quadruped articulation (flow sim ≈ 0.965)
#   davis_walking_to_tuktuk   : camera-translation / street parallax (flow sim ≈ 0.984)
# Hard pairs (large domain shift — test cross-domain generalisation):
#   davis_paragliding_to_boxing : aerial freedom → fisheye indoor combat
#   davis_goldfish_to_nightrace : underwater stillness → high-speed night driving
samples:
  - sample_id: "davis_drift_straight_to_drift_turn"
    start_images: "data/raw/DAVIS/JPEGImages/480p/drift-straight"
    end_images:   "data/raw/DAVIS/JPEGImages/480p/drift-turn"
    prompt: >
      A race car drifts aggressively through an asphalt section, smoke curling from
      the rear tires as the camera tracks the vehicle from a low dynamic angle. The
      straight drift line transitions into a curved drift turn with similar track
      textures and lighting, preserving motorsport energy while changing trajectory.

  - sample_id: "davis_dance_twirl_to_dancing"
    start_images: "data/raw/DAVIS/JPEGImages/480p/dance-twirl"
    end_images:   "data/raw/DAVIS/JPEGImages/480p/dancing"
    prompt: >
      A dancer spins fluidly in place, fabric and limbs tracing circular arcs in a
      rhythmic performance. The twirling motion transitions into a broader dancing
      sequence with continued human-body articulation, keeping movement style coherent
      while varying pose progression and camera-relative motion.

  - sample_id: "davis_camel_to_horsejump"
    start_images: "data/raw/DAVIS/JPEGImages/480p/camel"
    end_images:   "data/raw/DAVIS/JPEGImages/480p/horsejump-low"
    prompt: >
      A lone camel strides steadily across a sunlit desert expanse, its heavy gait
      raising puffs of sand. The sandy terrain and warm amber light gradually give way
      to a green show-jumping course, where a horse and rider clear a low fence with
      confident precision.

  - sample_id: "davis_walking_to_tuktuk"
    start_images: "data/raw/DAVIS/JPEGImages/480p/walking"
    end_images:   "data/raw/DAVIS/JPEGImages/480p/tuk-tuk"
    prompt: >
      Two people walk casually along a tree-lined street, their footsteps unhurried
      on the pavement. The calm pedestrian pace dissolves into the vibrant moving
      perspective from inside a tuk-tuk weaving through busy traffic, buildings and
      motorbikes streaming past on both sides.

  - sample_id: "davis_paragliding_to_boxing"
    start_images: "data/raw/DAVIS/JPEGImages/480p/paragliding-launch"
    end_images:   "data/raw/DAVIS/JPEGImages/480p/boxing-fisheye"
    prompt: >
      A paraglider charges down a steep hillside and launches into open sky, wind
      rushing as the green landscape drops far below. The sweeping aerial freedom
      transitions to the compressed fisheye-distorted interior of a boxing gym, where
      two fighters circle each other under harsh overhead lights.

  - sample_id: "davis_goldfish_to_nightrace"
    start_images: "data/raw/DAVIS/JPEGImages/480p/gold-fish"
    end_images:   "data/raw/DAVIS/JPEGImages/480p/night-race"
    prompt: >
      Vivid orange goldfish drift in slow arcs through clear softly-lit water, their
      fins catching the light in silence. The quiet underwater world dissolves into a
      high-speed night race, headlights slicing through darkness and neon reflections
      smearing across wet asphalt.


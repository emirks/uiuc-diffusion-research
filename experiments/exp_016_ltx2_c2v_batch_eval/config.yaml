inputs:
  # Number of pixel frames loaded from each clip.
  # With LTX temporal scale=8: 25 frames → 3 latent tokens per clip.
  num_clip_frames: 25
  start_clip_strength: 1.0
  end_clip_strength: 1.0
  negative_prompt: >
    blurry, out of focus, overexposed, underexposed, low contrast, washed out colors,
    excessive noise, grainy texture, poor lighting, flickering, motion blur, distorted
    proportions, unnatural skin tones, deformed facial features, extra limbs, disfigured
    hands, artifacts, inconsistent perspective, camera shake, jittery movement, AI artifacts.

inference:
  height: 512         # final output resolution; stage-1 runs at half (256×384)
  width: 768
  # 97 frames at 24 fps ≈ 4 s.  (97-1) % 8 == 0 ✓
  # With num_clip_frames=24 → frame_idx_end = 97-24 = 73.
  num_frames: 97
  frame_rate: 24
  num_inference_steps: 40

runtime:
  seed: 42

outputs:
  dir: "outputs/videos/exp_016_ltx2_c2v_batch_eval"

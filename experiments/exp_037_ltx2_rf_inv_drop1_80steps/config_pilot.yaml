# exp_037 — exp_033 (drop1) at DOUBLED inversion step count (40 → 80).
# Tests whether the deployable floor has any numerical headroom (truncation
# error reduction) without changing the recipe.

model:
  model_id: "Lightricks/LTX-2"

samples:
  - sample_id: "shadow_smoke_0"
    clip: "data/processed/transitions/shadow_smoke/shadow_smoke.mp4"
  - sample_id: "shadow_smoke_5"
    clip: "data/processed/transitions/shadow_smoke/shadow_smoke_5.mp4"

inputs:
  num_clip_frames: 25
  start_clip_strength: 1.0
  end_clip_strength: 1.0
  prompt: "A floating black smoke transition between objects."
  negative_prompt: "blurry, distorted, low quality."

inference:
  max_area: 393216
  num_frames: 121
  frame_rate: 24.0
  num_inference_steps: 80
  guidance_scale: 4.0

inversion:
  num_steps: 80
  guidance_scale: 1.0
  solver: "rf_solver_midpoint_2nd"
  cache_sigma_checkpoints: [0.25, 0.50, 0.75]
  gate:
    latent_rel_max: 0.10
    latent_cos_min: 0.99
    latent_rel_max_regen_mult: 2.0
    latent_cos_min_regen: 0.97

regeneration:
  num_steps: 40
  guidance_scale: 4.0
  solver: "euler"

runtime:
  seed: 42

outputs:
  dir: "outputs/videos/exp_037_ltx2_rf_inv_drop1_80steps"

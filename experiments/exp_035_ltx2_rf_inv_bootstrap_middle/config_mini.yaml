# exp_035 B0 mini-falsification — single borderline clip, REDUCED steps to
# minimize GPU time. The point is to verify: (a) bootstrap mp4 isn't garbage,
# (b) the recipe doesn't crash, (c) PSNR is in a defensible range. If those
# pass, scale to config_pilot.yaml.

model:
  model_id: "Lightricks/LTX-2"

samples:
  - sample_id: "shadow_smoke_0"
    clip: "data/processed/transitions/shadow_smoke/shadow_smoke.mp4"

inputs:
  num_clip_frames: 25
  start_clip_strength: 1.0
  end_clip_strength: 1.0
  prompt: "A floating black smoke transition between objects."
  negative_prompt: "blurry, distorted, low quality."

inference:
  max_area: 393216
  num_frames: 121
  frame_rate: 24.0
  num_inference_steps: 20
  guidance_scale: 4.0

bootstrap:
  num_steps: 10
  guidance_scale: 4.0
  decode_video: true

inversion:
  num_steps: 20
  guidance_scale: 1.0
  solver: "rf_solver_midpoint_2nd"
  cache_sigma_checkpoints: [0.25, 0.50, 0.75]
  gate:
    latent_rel_max: 0.10
    latent_cos_min: 0.99
    latent_rel_max_regen_mult: 2.0
    latent_cos_min_regen: 0.97

regeneration:
  num_steps: 20
  guidance_scale: 4.0
  solver: "euler"

runtime:
  seed: 42

outputs:
  dir: "outputs/videos/exp_035_ltx2_rf_inv_bootstrap_middle"

# exp_056 — IC-LoRA in-context transition transfer on LTX-2 19B.
#
# One adapter over 131 same-class pairs from 10 transition families (46 clips;
# jump_transition held out entirely as an unseen reference class). Per training
# sample: REFERENCE = full 121f latent of another clip from the same class
# (concatenated in-context, clean, loss-excluded), ENDPOINTS of the target
# pinned via prefix(2 latent frames = first 9 px) + suffix(1 latent frame =
# last 8 px), TARGET = the full clip; supervision lands on the middle 13/16
# latent frames. Captions are endpoint-only with the fixed generic phrase
# "The scene transforms into" — the transition TYPE is only observable in the
# reference video, forcing in-context transfer.
#
# Base: official v2v_ic_lora.yaml (rank 32/a32 + FFN targets, lr 2e-4,
# 3000 steps) + the exp_051-validated prefix/suffix C2V conditions.

model:
  model_path: "/projects/illinois/eng/cs/jrehg/users/emirkisa/cache/huggingface/ltx2_models/ltx-2-19b-dev.safetensors"
  text_encoder_path: "/projects/illinois/eng/cs/jrehg/users/emirkisa/cache/huggingface/gemma/gemma-3-12b-it-qat-q4_0-unquantized"
  training_mode: "lora"
  load_checkpoint: null

lora:
  rank: 32
  alpha: 32
  dropout: 0.0
  # official video-only IC-LoRA recipe: attention + FFN
  target_modules:
    - "attn1.to_k"
    - "attn1.to_q"
    - "attn1.to_v"
    - "attn1.to_out.0"
    - "attn2.to_k"
    - "attn2.to_q"
    - "attn2.to_v"
    - "attn2.to_out.0"
    - "ff.net.0.proj"
    - "ff.net.2"

training_strategy:
  name: "flexible"
  video:
    is_generated: true
    latents_dir: "latents"
    conditions:
      - type: reference
        latents_dir: "reference_latents"
        probability: 1.0
      - type: prefix
        temporal_boundary: 2   # latent frames -> first 9 pixel frames clean
        probability: 1.0
      - type: suffix
        temporal_boundary: 1   # latent frames -> last 8 pixel frames clean
        probability: 1.0

optimization:
  learning_rate: 2e-4
  steps: 3000
  batch_size: 1
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  optimizer_type: "adamw"
  scheduler_type: "linear"
  scheduler_params: { }
  enable_gradient_checkpointing: true

acceleration:
  mixed_precision_mode: "bf16"
  quantization: null
  load_text_encoder_in_8bit: false
  offload_optimizer_during_validation: false

data:
  preprocessed_data_root: "/projects/illinois/eng/cs/jrehg/users/emirkisa/diffusion-research/experiments/exp_056_ltx2_ic_lora_transition_transfer/dataset/.precomputed"
  num_dataloader_workers: 2

validation:
  samples:
    # 1) cross-class transfer (the core capability): earth_wave endpoints,
    #    shadow_smoke reference -> must impose the smoke morphology.
    - prompt: >-
        ICTRANS A young woman with slicked-back dark hair in braided buns,
        wraparound sunglasses, and a cropped black leather jacket with white
        piping stands in a narrow bookstore aisle between tall shelves packed
        with colorful books, seen from a high angle. The scene transforms into
        a woman with a voluminous dark afro, black sport sunglasses, and a
        silver chain choker standing on a sunlit concrete staircase beneath
        tall bright windows, gazing up toward the camera.
      conditions:
        - type: prefix
          video: "/projects/illinois/eng/cs/jrehg/users/emirkisa/diffusion-research/experiments/exp_056_ltx2_ic_lora_transition_transfer/dataset/cond_ew0_start9.mp4"
          num_frames: 9    # pixel frames, %8==1 -> 2 latent frames at position 0
        - type: suffix
          video: "/projects/illinois/eng/cs/jrehg/users/emirkisa/diffusion-research/experiments/exp_056_ltx2_ic_lora_transition_transfer/dataset/cond_ew0_end9.mp4"
          num_frames: 8    # pixel frames, %8==0 -> keep only the FINAL latent frame
        - type: reference
          video: "/projects/illinois/eng/cs/jrehg/users/emirkisa/diffusion-research/data/processed/transitions_std121/shadow_smoke/shadow_smoke_3.mp4"
          downscale_factor: 1
          temporal_scale_factor: 1
          include_in_output: true
    # 2) unseen-class reference: same endpoints/prompt, jump_transition
    #    reference (family never seen in training) -> true in-context probe.
    - prompt: >-
        ICTRANS A young woman with slicked-back dark hair in braided buns,
        wraparound sunglasses, and a cropped black leather jacket with white
        piping stands in a narrow bookstore aisle between tall shelves packed
        with colorful books, seen from a high angle. The scene transforms into
        a woman with a voluminous dark afro, black sport sunglasses, and a
        silver chain choker standing on a sunlit concrete staircase beneath
        tall bright windows, gazing up toward the camera.
      conditions:
        - type: prefix
          video: "/projects/illinois/eng/cs/jrehg/users/emirkisa/diffusion-research/experiments/exp_056_ltx2_ic_lora_transition_transfer/dataset/cond_ew0_start9.mp4"
          num_frames: 9
        - type: suffix
          video: "/projects/illinois/eng/cs/jrehg/users/emirkisa/diffusion-research/experiments/exp_056_ltx2_ic_lora_transition_transfer/dataset/cond_ew0_end9.mp4"
          num_frames: 8
        - type: reference
          video: "/projects/illinois/eng/cs/jrehg/users/emirkisa/diffusion-research/data/processed/transitions_std121/jump_transition/jump_transition_1.mp4"
          downscale_factor: 1
          temporal_scale_factor: 1
          include_in_output: true
    # 3) in-class training-fit gauge: shadow_smoke_0 endpoints, shadow_smoke_1
    #    reference (this exact pair IS in the training set).
    - prompt: >-
        ICTRANS A young man with curly dark hair and a mustache, wearing a dark
        green cardigan over a white collared shirt and a patterned tie, lies in
        a field of yellow wildflowers below rocky mountains reading a large
        newspaper, seen from a close low frontal angle. The scene transforms
        into a bearded man in a black suit and sunglasses riding an orange BMX
        bike down a sunlit suburban street with his legs spread wide, cars
        parked along the road behind him.
      conditions:
        - type: prefix
          video: "/projects/illinois/eng/cs/jrehg/users/emirkisa/diffusion-research/experiments/exp_056_ltx2_ic_lora_transition_transfer/dataset/cond_ss0_start9.mp4"
          num_frames: 9
        - type: suffix
          video: "/projects/illinois/eng/cs/jrehg/users/emirkisa/diffusion-research/experiments/exp_056_ltx2_ic_lora_transition_transfer/dataset/cond_ss0_end9.mp4"
          num_frames: 8
        - type: reference
          video: "/projects/illinois/eng/cs/jrehg/users/emirkisa/diffusion-research/data/processed/transitions_std121/shadow_smoke/shadow_smoke_1.mp4"
          downscale_factor: 1
          temporal_scale_factor: 1
          include_in_output: true
  negative_prompt: "worst quality, inconsistent motion, distorted, jittery"
  video_dims: [ 480, 640, 121 ]
  frame_rate: 24.0
  seed: 42
  inference_steps: 30
  interval: 250
  guidance_scale: 4.0
  stg_scale: 1.0
  stg_blocks: [29]
  stg_mode: "stg_v"
  generate_audio: false
  skip_initial_validation: false

checkpoints:
  interval: 250
  keep_last_n: -1
  precision: "bfloat16"

flow_matching:
  timestep_sampling_mode: "shifted_logit_normal"
  timestep_sampling_params: { }

hub:
  push_to_hub: false
  hub_model_id: null

wandb:
  enabled: true
  project: "creative-transition-transfer"
  entity: null
  tags: [ "ltx2", "ic-lora", "v2v", "exp_056", "transition-transfer" ]
  log_validation_videos: true

seed: 42
output_dir: "/projects/illinois/eng/cs/jrehg/users/emirkisa/diffusion-research/outputs/training/exp_056_ltx2_ic_lora_transition_transfer/ic"

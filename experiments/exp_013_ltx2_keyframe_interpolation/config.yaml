model:
  # Download to /workspace/cache/models/ (see experiment README for commands)
  checkpoint_path: "/workspace/cache/models/LTX-2/ltx-2-19b-dev.safetensors"
  distilled_lora_path: "/workspace/cache/models/LTX-2/ltx-2-19b-distilled-lora-384.safetensors"
  distilled_lora_strength: 0.8
  spatial_upsampler_path: "/workspace/cache/models/LTX-2/ltx-2-spatial-upscaler-x2-1.0.safetensors"
  # Download all assets from https://huggingface.co/google/gemma-3-12b-it-qat-q4_0-unquantized
  gemma_root: "/workspace/cache/models/gemma-3-12b-it-qat-q4_0-unquantized"

inputs:
  first_frame: "data/processed/vc-bench-flf/first_last_frames/Actions_Activities_action_action_1581362_2562x1440_b27b9c451a/first.png"
  last_frame:  "data/processed/vc-bench-flf/first_last_frames/Actions_Activities_action_action_1581362_2562x1440_b27b9c451a/last.png"
  # Frame conditioning strengths
  first_frame_strength: 1.0
  last_frame_strength: 1.0
  prompt: >
    A person performs a dynamic physical action outdoors. The scene transitions
    smoothly from the opening pose through natural motion, with stable camera,
    coherent lighting, and realistic movement. Cinematic framing, clean details.
  negative_prompt: >
    worst quality, low quality, blurry, static, overexposed, artifacts, watermark,
    text, subtitles, disfigured, deformed, extra limbs, abrupt jump cuts.

inference:
  height: 512         # stage-1 height (stage-2 doubles to 1024)
  width: 768          # stage-1 width  (stage-2 doubles to 1536)
  num_frames: 97      # must satisfy: (num_frames - 1) % 8 == 0  →  8*12+1
  frame_rate: 24.0
  num_inference_steps: 40

runtime:
  seed: 42
  device: cuda

outputs:
  dir: "outputs/videos/exp_013_ltx2_keyframe_interpolation"

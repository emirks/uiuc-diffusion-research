model:
  model_path: /projects/illinois/eng/cs/jrehg/users/emirkisa/cache/huggingface/ltx2_models/ltx-2-19b-dev.safetensors
  text_encoder_path: /projects/illinois/eng/cs/jrehg/users/emirkisa/cache/huggingface/gemma/gemma-3-12b-it-qat-q4_0-unquantized
  training_mode: lora
  load_checkpoint: null
lora:
  rank: 32
  alpha: 32
  dropout: 0.0
  target_modules:
  - attn1.to_k
  - attn1.to_q
  - attn1.to_v
  - attn1.to_out.0
  - attn2.to_k
  - attn2.to_q
  - attn2.to_v
  - attn2.to_out.0
  - ff.net.0.proj
  - ff.net.2
training_strategy:
  name: transition
  video:
    is_generated: true
    latents_dir: latents
    conditions:
    - type: reference
      latents_dir: reference_latents
      probability: 0.9
    - type: mask
      mask_dir: masks
      probability: 1.0
  residual_reference: true
  gamma: 1.0922
  lambda_par: 1.0
  margin_enabled: false
  refswap_pair:
  - 0
  - 4
optimization:
  learning_rate: 2e-4
  steps: 5000
  batch_size: 1
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  optimizer_type: adamw
  scheduler_type: linear
  scheduler_params: {}
  enable_gradient_checkpointing: true
acceleration:
  mixed_precision_mode: bf16
  quantization: null
  load_text_encoder_in_8bit: false
  offload_optimizer_during_validation: false
data:
  preprocessed_data_root: /projects/illinois/eng/cs/jrehg/users/emirkisa/diffusion-research/experiments/exp_064_ic3_aligned_retrain/dataset/.precomputed
  num_dataloader_workers: 2
validation:
  samples:
  - prompt: ICTRANS A young woman with slicked-back dark hair in braided buns, wraparound
      sunglasses, and a cropped black leather jacket with white piping stands in a
      narrow bookstore aisle between tall shelves packed with colorful books, seen
      from a high angle. The scene transforms into a woman with a voluminous dark
      afro, black sport sunglasses, and a silver chain choker standing on a sunlit
      concrete staircase beneath tall bright windows, gazing up toward the camera.
    conditions:
    - type: prefix
      video: /projects/illinois/eng/cs/jrehg/users/emirkisa/diffusion-research/experiments/exp_056_ltx2_ic_lora_transition_transfer/dataset/cond_ew0_start9.mp4
      num_frames: 9
    - type: suffix
      video: /projects/illinois/eng/cs/jrehg/users/emirkisa/diffusion-research/experiments/exp_056_ltx2_ic_lora_transition_transfer/dataset/cond_ew0_end9.mp4
      num_frames: 8
    - type: reference
      video: /projects/illinois/eng/cs/jrehg/users/emirkisa/diffusion-research/data/processed/transitions_std121/shadow_smoke/shadow_smoke_3.mp4
      downscale_factor: 1
      temporal_scale_factor: 1
      include_in_output: true
  - prompt: ICTRANS A blonde woman wearing white earmuffs, a white fur-trimmed jacket,
      a light blue cardigan, and a matching butterfly-embroidered skirt poses in a
      snowy mountain landscape under a clear blue sky. The scene transforms into a
      woman wearing a translucent, ice-like blue outfit with extended, glass-like
      fabric stands in a snowy landscape with mountains under a bright blue sky.
    conditions:
    - type: prefix
      video: /projects/illinois/eng/cs/jrehg/users/emirkisa/diffusion-research/experiments/exp_058_ic_lora_diverse_retrain/dataset/cond_water_element_0_start9.mp4
      num_frames: 9
    - type: reference
      video: /projects/illinois/eng/cs/jrehg/users/emirkisa/diffusion-research/data/processed/transitions_std121/water_element/water_element_1.mp4
      downscale_factor: 1
      temporal_scale_factor: 1
      include_in_output: true
  - prompt: ICTRANS A muscular man with long blonde hair and a beard stands on a rooftop
      overlooking a city skyline under a clear blue sky, wearing a sparkly blue and
      pink rhinestone-studded bodysuit and a voluminous pink feathered cape. The scene
      transforms into a first-person perspective shows a clenched fist in a light
      blue sleeve with pink dots extended over a city street and skyline under a bright,
      sunny sky.
    conditions:
    - type: prefix
      video: /projects/illinois/eng/cs/jrehg/users/emirkisa/diffusion-research/experiments/exp_058_ic_lora_diverse_retrain/dataset/cond_hero_flight_0_start9.mp4
      num_frames: 9
    - type: reference
      video: /projects/illinois/eng/cs/jrehg/users/emirkisa/diffusion-research/data/processed/transitions_std121/hero_flight/hero_flight_1.mp4
      downscale_factor: 1
      temporal_scale_factor: 1
      include_in_output: true
  - prompt: A blonde woman wearing white earmuffs, a white fur-trimmed jacket, a light
      blue cardigan, and a matching butterfly-embroidered skirt poses in a snowy mountain
      landscape under a clear blue sky. She continues posing calmly as the camera
      holds steady.
    conditions:
    - type: prefix
      video: /projects/illinois/eng/cs/jrehg/users/emirkisa/diffusion-research/experiments/exp_058_ic_lora_diverse_retrain/dataset/cond_water_element_0_start9.mp4
      num_frames: 9
  - prompt: ICTRANS A young woman with slicked-back dark hair in braided buns, wraparound
      sunglasses, and a cropped black leather jacket with white piping stands in a
      narrow bookstore aisle between tall shelves packed with colorful books, seen
      from a high angle. The scene transforms into a woman with a voluminous dark
      afro, black sport sunglasses, and a silver chain choker standing on a sunlit
      concrete staircase beneath tall bright windows, gazing up toward the camera.
    conditions:
    - type: prefix
      video: /projects/illinois/eng/cs/jrehg/users/emirkisa/diffusion-research/experiments/exp_056_ltx2_ic_lora_transition_transfer/dataset/cond_ew0_start9.mp4
      num_frames: 9
    - type: suffix
      video: /projects/illinois/eng/cs/jrehg/users/emirkisa/diffusion-research/experiments/exp_056_ltx2_ic_lora_transition_transfer/dataset/cond_ew0_end9.mp4
      num_frames: 8
    - type: reference
      video: /projects/illinois/eng/cs/jrehg/users/emirkisa/diffusion-research/data/processed/transitions_std121/water_element/water_element_1.mp4
      downscale_factor: 1
      temporal_scale_factor: 1
      include_in_output: true
  negative_prompt: worst quality, inconsistent motion, distorted, jittery
  video_dims:
  - 480
  - 640
  - 121
  frame_rate: 24.0
  seed: 42
  inference_steps: 30
  interval: 500
  guidance_scale: 4.0
  stg_scale: 1.0
  stg_blocks:
  - 29
  stg_mode: stg_v
  generate_audio: false
  skip_initial_validation: false
checkpoints:
  interval: 500
  keep_last_n: -1
  precision: bfloat16
flow_matching:
  timestep_sampling_mode: shifted_logit_normal
  timestep_sampling_params: {}
hub:
  push_to_hub: false
  hub_model_id: null
wandb:
  enabled: true
  project: creative-transition-transfer
  entity: null
  tags:
  - ltx2
  - ic-lora
  - method_impl
  - stage2
  - exp_067
  log_validation_videos: true
seed: 42
output_dir: /projects/illinois/eng/cs/jrehg/users/emirkisa/diffusion-research/outputs/training/exp_067_s2_residual_generalist/s2

# exp_025 — LTX-2 Negative Prompt Sweep — PLACEHOLDER (not implemented)
#
# Forked from exp_024 design. To implement:
#   - Replicate exp_024/run.py structure
#   - Iterate over `negative_prompt_variants` per sample instead of `prompt_variants`
#   - Lock positive prompt to "" for every run

model:
  model_id: "Lightricks/LTX-2"
  distilled_lora_strength: 1.0

# Diagnostic subset — pick one easy / one mid / one hard pair from exp_024.
# Fill in once we return to implementation.
samples: []

inputs:
  num_clip_frames: 25
  start_clip_strength: 1.0
  end_clip_strength: 1.0
  positive_prompt: ""   # locked — empty wins from exp_024

  negative_prompt_variants:
    - variant: "N_empty"
      text: ""
    - variant: "N_minimal"
      text: "low quality, jpeg artifacts, text, watermark"
    - variant: "N_current"
      text: >
        distortion, flicker, jitter, stutter, shaky camera, erratic motion,
        temporal artifacts, frame blending, low quality, jpeg artifacts,
        text, watermark, logo, cartoon, anime, CGI
    - variant: "N_anti_dissolve"
      text: "dissolve, crossfade, fade, static, frozen, lifeless, abrupt cut"

inference:
  height: 512
  width: 768
  num_frames: 193
  frame_rate: 24.0
  num_inference_steps: 40
  guidance_scale: 3.2
  run_stage2: true

runtime:
  seed: 42

outputs:
  dir: "outputs/videos/exp_025_ltx2_negative_prompt_sweep"

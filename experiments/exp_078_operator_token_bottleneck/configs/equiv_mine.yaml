acceleration:
  load_text_encoder_in_8bit: false
  mixed_precision_mode: bf16
  offload_optimizer_during_validation: false
  quantization: null
checkpoints:
  interval: 1000
  keep_last_n: -1
  no_resume: false
  precision: bfloat16
  save_training_state: minimal
data:
  num_dataloader_workers: 2
  preprocessed_data_root: /projects/illinois/eng/cs/jrehg/users/emirkisa/diffusion-research/.claude/worktrees/bottleneck-branch/experiments/exp_078_operator_token_bottleneck/dataset/roots/b1
flow_matching:
  timestep_sampling_mode: shifted_logit_normal
  timestep_sampling_params: {}
hub:
  hub_model_id: null
  push_to_hub: false
lora:
  alpha: 32
  dropout: 0.0
  rank: 32
  target_modules:
  - attn1.to_k
  - attn1.to_q
  - attn1.to_v
  - attn1.to_out.0
  - attn2.to_k
  - attn2.to_q
  - attn2.to_v
  - attn2.to_out.0
  - ff.net.0.proj
  - ff.net.2
model:
  load_checkpoint: null
  model_path: /projects/illinois/eng/cs/jrehg/users/emirkisa/cache/huggingface/ltx2_models/ltx-2-19b-dev.safetensors
  text_encoder_path: /projects/illinois/eng/cs/jrehg/users/emirkisa/cache/huggingface/gemma/gemma-3-12b-it-qat-q4_0-unquantized
  training_mode: lora
optimization:
  batch_size: 1
  enable_gradient_checkpointing: true
  gradient_accumulation_steps: 1
  learning_rate: 0.0002
  max_grad_norm: 1.0
  optimizer_type: adamw
  scheduler_params: {}
  scheduler_type: linear
  steps: 150
output_dir: /projects/illinois/eng/cs/jrehg/users/emirkisa/diffusion-research/.claude/worktrees/bottleneck-branch/outputs/training/bneck/equiv_mine
seed: 42
training_strategy:
  audio: null
  name: flexible
  video:
    cond_clean_latents_dir: cond_clean_latents
    conditions:
    - latents_dir: reference_latents
      probability: 1.0
      type: reference
    - mask_dir: masks
      probability: 1.0
      type: mask
    is_generated: true
    latents_dir: latents
validation:
  generate_audio: false
  generate_video: false
  interval: null
  prompts: []
  samples: []

# exp_049 SMOKE — decisive mechanism check on one clip (ss6).
# self_all_g1.0 must beat exp_048's static-target self free-mid 13.05, toward
# recon (~22-27). If it does not, the σ-matched-trajectory premise is wrong.
model:
  model_id: "Lightricks/LTX-2"
cache_source:
  run_dir: "outputs/videos/exp_040_ltx2_feature_cache/run_0002"
samples:
  - {sample_id: "shadow_smoke_6", clip: "data/processed/transitions/shadow_smoke/shadow_smoke_6.mp4", donor: "shadow_smoke_0"}
inputs:
  num_clip_frames: 17
  start_clip_strength: 1.0
  end_clip_strength: 1.0
  prompt: "A floating black smoke transition between objects."
  negative_prompt: "blurry, distorted, low quality."
inference:
  max_area: 393216
  num_frames: 121
  frame_rate: 24.0
  num_inference_steps: 40
regeneration:
  num_steps: 40
regen_variants:
  - {name: "base_g0",        guidance_scale: 4.0, guide_weight: 0.0}
  - {name: "self_all_g1.0",  guidance_scale: 4.0, guide_weight: 1.0, source: "self", window: "all"}
  - {name: "self_late_g1.0", guidance_scale: 4.0, guide_weight: 1.0, source: "self", window: "late"}
runtime:
  seed: 42
outputs:
  dir: "outputs/videos/exp_049_smoke_signature_inject"

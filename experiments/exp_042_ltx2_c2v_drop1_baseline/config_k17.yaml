# exp_042 — Production C2V baseline (drop1) with K=17-frame anchors.
#
# Identical to config.yaml except for num_clip_frames=17. K=17 is the
# *compression-aligned* anchor length for LTX-2's vae_temporal_compression=8:
#   k_lat = (K - 1)//8 + 1
#     K=17 → 3 latents, covering exactly (3-1)*8 + 1 = 17 pixel frames (no slack)
#     K=16 → 2 latents (15//8+1=2), but only fills 9 pixel frames worth of latents
#     K=25 → 4 latents (default; this is what config.yaml uses)
#
# Shorter anchors = more free middle for the model to generate. With K=17
# the end anchor's first latent (index 13) is drop1'd, leaving anchor at
# latent frames 14..15 (2 clean latents) instead of 13..15 (3 clean
# latents). end_clip_index = n_lat − k_lat = 16 − 3 = 13.

model:
  model_id: "Lightricks/LTX-2"
  distilled_lora_strength: 1.0

samples:
  - sample_id: "shadow_smoke_0"
    clip: "data/processed/transitions/shadow_smoke/shadow_smoke.mp4"
  - sample_id: "shadow_smoke_1"
    clip: "data/processed/transitions/shadow_smoke/shadow_smoke_1.mp4"
  - sample_id: "shadow_smoke_2"
    clip: "data/processed/transitions/shadow_smoke/shadow_smoke_2.mp4"
  - sample_id: "shadow_smoke_3"
    clip: "data/processed/transitions/shadow_smoke/shadow_smoke_3.mp4"
  - sample_id: "shadow_smoke_4"
    clip: "data/processed/transitions/shadow_smoke/shadow_smoke_4.mp4"
  - sample_id: "shadow_smoke_5"
    clip: "data/processed/transitions/shadow_smoke/shadow_smoke_5.mp4"
  - sample_id: "shadow_smoke_6"
    clip: "data/processed/transitions/shadow_smoke/shadow_smoke_6.mp4"
  - sample_id: "shadow_smoke_7"
    clip: "data/processed/transitions/shadow_smoke/shadow_smoke_7.mp4"
  - sample_id: "shadow_smoke_8"
    clip: "data/processed/transitions/shadow_smoke/shadow_smoke_8.mp4"
  - sample_id: "shadow_smoke_9"
    clip: "data/processed/transitions/shadow_smoke/shadow_smoke_9.mp4"

inputs:
  num_clip_frames: 17
  start_clip_strength: 1.0
  end_clip_strength: 1.0
  prompt: "A floating black smoke transition between objects."
  negative_prompt: >
    overexposed, underexposed, low contrast, washed out colors, poor lighting,
    distorted proportions, unnatural skin tones, deformed facial features,
    extra limbs, disfigured hands, artifacts, inconsistent perspective,
    AI artifacts.

inference:
  max_area: 393216
  num_frames: 121
  frame_rate: 24.0
  num_inference_steps: 40
  guidance_scale: 3.2

runtime:
  seed: 42

outputs:
  dir: "outputs/videos/exp_042_ltx2_c2v_drop1_baseline"

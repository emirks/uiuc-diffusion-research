# exp_042 — Production C2V baseline with drop1.
#
# Mirrors exp_020's two-stage production mechanics (Stage 1 base + Latent
# Upsampler + Stage 2 distilled LoRA + audio muxed into mp4 via
# encode_video) but keeps this experiment's content invariants:
#   - shadow_smoke samples 0..9 (all 10)
#   - the smoke transition prompt
#   - CFG=3.2 (matches exp_040/041)
#   - max_area resolution policy (matches exp_040/041)
#   - drop1 monkey-patch on apply_visual_conditioning (Stage 1 only)
#
# Both Stage 1 and Stage 2 outputs are saved per sample so the difference
# between the base-model latent and the distilled-upscaled refinement is
# visible side-by-side.

model:
  model_id: "Lightricks/LTX-2"
  # Distilled LoRA used by Stage 2 (set_adapters("stage_2_distilled", strength)).
  distilled_lora_strength: 1.0

samples:
  - sample_id: "shadow_smoke_0"
    clip: "data/processed/transitions/shadow_smoke/shadow_smoke.mp4"
  - sample_id: "shadow_smoke_1"
    clip: "data/processed/transitions/shadow_smoke/shadow_smoke_1.mp4"
  - sample_id: "shadow_smoke_2"
    clip: "data/processed/transitions/shadow_smoke/shadow_smoke_2.mp4"
  - sample_id: "shadow_smoke_3"
    clip: "data/processed/transitions/shadow_smoke/shadow_smoke_3.mp4"
  - sample_id: "shadow_smoke_4"
    clip: "data/processed/transitions/shadow_smoke/shadow_smoke_4.mp4"
  - sample_id: "shadow_smoke_5"
    clip: "data/processed/transitions/shadow_smoke/shadow_smoke_5.mp4"
  - sample_id: "shadow_smoke_6"
    clip: "data/processed/transitions/shadow_smoke/shadow_smoke_6.mp4"
  - sample_id: "shadow_smoke_7"
    clip: "data/processed/transitions/shadow_smoke/shadow_smoke_7.mp4"
  - sample_id: "shadow_smoke_8"
    clip: "data/processed/transitions/shadow_smoke/shadow_smoke_8.mp4"
  - sample_id: "shadow_smoke_9"
    clip: "data/processed/transitions/shadow_smoke/shadow_smoke_9.mp4"

inputs:
  num_clip_frames: 25
  start_clip_strength: 1.0
  end_clip_strength: 1.0
  prompt: "A floating black smoke transition between objects."
  # Negative prompt seeded from exp_020 (its DAVIS production sweep) minus
  # any term that would suppress *natural* smoke characteristics: smoke is
  # inherently diffuse/soft-edged, fluidly moving, particle-textured, and
  # often reads as noise/grain — so we strip the terms that punish those
  # properties (blurry, out of focus, motion blur, flickering, grainy
  # texture, excessive noise, jittery movement, camera shake) and keep
  # only the lighting / artifact / anatomy terms.
  negative_prompt: >
    overexposed, underexposed, low contrast, washed out colors, poor lighting,
    distorted proportions, unnatural skin tones, deformed facial features,
    extra limbs, disfigured hands, artifacts, inconsistent perspective,
    AI artifacts.

inference:
  max_area: 393216
  num_frames: 121
  frame_rate: 24.0
  # Stage 1: non-distilled, 40 steps, CFG=3.2 (this experiment's invariant).
  num_inference_steps: 40
  guidance_scale: 3.2
  # Stage 2 is fixed by the distilled recipe (3 steps, CFG=1.0,
  # STAGE_2_DISTILLED_SIGMA_VALUES) — not config-controlled.

runtime:
  seed: 42

outputs:
  dir: "outputs/videos/exp_042_ltx2_c2v_drop1_baseline"

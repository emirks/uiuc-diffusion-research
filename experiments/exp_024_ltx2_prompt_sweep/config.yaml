inputs:
  # Number of pixel frames loaded from each clip.
  # LTX temporal scale = 8: (25-1)//8+1 = 4 latent frames per clip.
  # end_clip_index = latent_num_frames - clip_latent_frames = 25 - 4 = 21.
  num_clip_frames: 25
  start_clip_strength: 1.0
  end_clip_strength: 1.0
  # Negative prompt per LTX-2 specification for prompt sweep experiments.
  # "morphing" and "warping" removed — Category B prompts now explicitly describe
  # semantic morphing; including them in the negative prompt would fight the intent.
  negative_prompt: >
    distortion, flicker, jitter, stutter, shaky camera, erratic motion,
    temporal artifacts, frame blending, low quality, jpeg artifacts,
    text, watermark, logo, cartoon, anime, CGI

inference:
  height: 512
  width: 768
  # 193 frames at 24 fps ≈ 8 s.  (193-1) % 8 == 0 ✓  → 25 latent frames.
  num_frames: 193
  frame_rate: 24.0
  num_inference_steps: 40
  # CFG 3.2 per Step 4 specification (was 4.0 in exp_020).
  guidance_scale: 3.2
  # Set to false to skip upsampler + Stage 2 and output Stage 1 only (512×768).
  # Useful for fast iteration once Stage 1 quality is confirmed sufficient.
  run_stage2: true

runtime:
  seed: 42

outputs:
  dir: "outputs/videos/exp_024_ltx2_prompt_sweep"

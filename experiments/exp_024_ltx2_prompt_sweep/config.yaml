model:
  model_id: "Lightricks/LTX-2"
  distilled_lora_strength: 1.0

# Prompt optimization sweep — 6 categories × 10 DAVIS pairs = 60 runs.
# Everything fixed except prompt text.  Same clip pairs as exp_020.
#
# Category key:
#   A_empty   — empty string (model floor)
#   A_word    — "transition" (minimal signal)
#   B         — generic cinematic structure, no named mechanism
#   C         — abstract transition descriptor, object-agnostic (same text for all pairs)
#   D         — typed creative transition with explicit source/target reference
#   E         — timed version of B with explicit "at 4s / by 6s" language
#
# Note: D_enhanced (enhance_prompt=True) is not supported by LTX2ConditionPipeline
# in Diffusers — omitted here.  All runs use enhance_prompt=False.

samples:

  # ── Class 1: similar context / similar category / similar movement ──────────
  - sample_id: "class1__blackswan__mallard-water"
    class: "1_similar_context_similar_category_similar_movement"
    start_clip: "data/processed/DAVIS/blackswan/2s.mp4"
    end_clip:   "data/processed/DAVIS/mallard-water/2s.mp4"
    prompt_variants:

      - category: "A_empty"
        text: ""

      - category: "A_word"
        text: "transition"

      - category: "B"
        text: >-
          Wide establishing shot, a black swan glides steadily across dark green canal water,
          its reflection trailing in slow ripples. As the bird moves forward, the deep black
          of its plumage brightens at the edges — individual feathers lightening from jet to
          warm chestnut and brown, a shimmer of iridescent green growing along the crown of
          the head. The neck shortens incrementally and the bill rounds and deepens in color,
          the bird's silhouette reshaping from the angular grace of the swan into the stockier
          proportions of a mallard. The dark canal water brightens around the transformed bird
          as overcast light warms to sunlit afternoon, and the bird — now a mallard duck —
          floats calmly on gently rippling water, its brown and green plumage fully settled.
          The camera holds tripod-locked on a 35mm lens at f/4, static frame. Silent.

      - category: "C"
        text: >-
          Wide frame, the visual content of the opening moment drifts in continuous
          lateral motion, edges softening as the image plane begins a slow outward
          expansion. The dominant movement of the first subject carries forward into the
          transition as a streak of motion blur along the primary axis, coherent for the
          first two seconds before fragmenting into directional smears. The smeared frame
          coalesces around a new anchor point, a second form asserting itself from the
          motion haze, its silhouette sharpening as peripheral blur drains away. The
          camera holds tripod-locked on a 35mm lens at f/2.8, static throughout. Natural
          motion blur throughout, 180-degree shutter equivalent. Silent.

      - category: "D"
        text: >-
          Wide shot, a black swan glides across still dark green canal water, its broad
          wings fanning open and pressing downward in a single slow powerful stroke,
          sending a radial sheet of water droplets across the surface in all directions.
          The droplets catch flat overcast light as they arc outward, each one a small
          bright point against the dark water, expanding into a translucent curtain of
          spray. Through the thinning curtain a mallard duck emerges, its brown and
          iridescent green plumage catching warm sunlit light as it bobs gently on
          rippling water, the spray fully draining from the frame as the mallard settles.
          The camera holds tripod-locked on a 50mm lens at f/2.8, static frame. Cool
          overcast canal light transitions to warm afternoon waterlight. Silent.

      - category: "E"
        text: >-
          Wide frame, a black swan glides steadily across dark green canal water for the
          first four seconds, neck arching forward, its reflection trailing in slow
          undulating ripples behind it. At 4 seconds the swan's wings spread and a burst
          of water spray radiates outward across the frame, a moving curtain of droplets
          obscuring the canal. By 6 seconds the spray thins and a mallard duck floats on
          sunlit rippling water, the droplets fully draining and the new scene stable. The
          camera holds tripod-locked on a 35mm lens at f/4, static throughout. Cool
          overcast canal light shifts to warm sunlit waterlight. Silent.


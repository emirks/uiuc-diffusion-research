          and steady, open sky above and landscape below. The camera pushes slowly forward
          on a 50mm lens at chest height, tracking the launch. Warm midday light
          throughout, no shadow shift. Silent.

      - category: "E"
        text: >-
          Wide frame, a paraglider sprints hard down a steep grassy hillside for the first

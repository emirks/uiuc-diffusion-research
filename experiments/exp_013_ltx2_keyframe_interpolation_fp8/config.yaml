model:
  # Checkpoint: FP8 file in HF hub cache (you already have this)
  checkpoint_path: "/workspace/cache/huggingface/hub/models--Lightricks--LTX-2/snapshots/47da56e2ad66ce4125a9922b4a8826bf407f9d0a/ltx-2-19b-dev-fp8.safetensors"
  # Downloaded via download_models.sh to ltx2_models/
  distilled_lora_path: "/workspace/cache/huggingface/ltx2_models/ltx-2-19b-distilled-lora-384.safetensors"
  distilled_lora_strength: 0.8
  spatial_upsampler_path: "/workspace/cache/huggingface/ltx2_models/ltx-2-spatial-upscaler-x2-1.0.safetensors"
  # Gemma 3 text encoder (download via download_models.sh)
  gemma_root: "/workspace/cache/huggingface/gemma/gemma-3-12b-it-qat-q4_0-unquantized"

inputs:
  first_frame: "data/processed/vc-bench-flf/first_last_frames/Actions_Activities_action_action_1581362_2562x1440_b27b9c451a/first.png"
  last_frame:  "data/processed/vc-bench-flf/first_last_frames/Actions_Activities_action_action_1581362_2562x1440_b27b9c451a/last.png"
  # Frame conditioning strengths
  first_frame_strength: 1.0
  last_frame_strength: 1.0
  prompt: >
    A person performs a dynamic physical action outdoors. The scene transitions
    smoothly from the opening pose through natural motion, with stable camera,
    coherent lighting, and realistic movement. Cinematic framing, clean details.
  negative_prompt: >
    blurry, out of focus, overexposed, underexposed, low contrast, washed out colors, excessive noise, grainy texture, poor lighting, flickering, motion blur, distorted proportions, unnatural skin tones, deformed facial features, asymmetrical face, missing facial features, extra limbs, disfigured hands, wrong hand count, artifacts around text, inconsistent perspective, camera shake, incorrect depth of field, background too sharp, background clutter, distracting reflections, harsh shadows, inconsistent lighting direction, color banding, cartoonish rendering, 3D CGI look, unrealistic materials, uncanny valley effect, incorrect ethnicity, wrong gender, exaggerated expressions, wrong gaze direction, mismatched lip sync, silent or muted audio, distorted voice, robotic voice, echo, background noise, off-sync audio,incorrect dialogue, added dialogue, repetitive speech, jittery movement, awkward pauses, incorrect timing, unnatural transitions, inconsistent framing, tilted camera, flat lighting, inconsistent tone, cinematic oversaturation, stylized filters, or AI artifacts.

inference:
  # height: 512
  # width: 768
  # num_frames: 97
  height: 320         # final output resolution; stage-1 runs at half (160×256)
  width: 512          # final output resolution; stage-1 runs at half (160×256)
  num_frames: 33      # must satisfy: (num_frames - 1) % 8 == 0  →  8*4+1
  frame_rate: 24
  # num_inference_steps: 24
  num_inference_steps: 24

runtime:
  seed: 42
  device: cuda

outputs:
  dir: "outputs/videos/exp_013_ltx2_keyframe_interpolation"

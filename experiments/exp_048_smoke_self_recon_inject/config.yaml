# exp_048 — within-clip recon-velocity injection to lift PRODUCTION regen PSNR > 18.
# Guide the production Euler regen free-middle toward the clip's OWN cached recon
# (z0_recon, deployable from z1+endpoints) so the editable production path reproduces
# the faithful inverted middle. Gate: regen free-mid / full PSNR median > 18 (vs 14.6/17.92).
model:
  model_id: "Lightricks/LTX-2"
z1_source:
  run_dir: "outputs/videos/exp_033_ltx2_rf_inv_drop1/run_0001"
samples:
  - {sample_id: "shadow_smoke_0", clip: "data/processed/transitions/shadow_smoke/shadow_smoke.mp4"}
  - {sample_id: "shadow_smoke_1", clip: "data/processed/transitions/shadow_smoke/shadow_smoke_1.mp4"}
  - {sample_id: "shadow_smoke_2", clip: "data/processed/transitions/shadow_smoke/shadow_smoke_2.mp4"}
  - {sample_id: "shadow_smoke_3", clip: "data/processed/transitions/shadow_smoke/shadow_smoke_3.mp4"}
  - {sample_id: "shadow_smoke_4", clip: "data/processed/transitions/shadow_smoke/shadow_smoke_4.mp4"}
  - {sample_id: "shadow_smoke_5", clip: "data/processed/transitions/shadow_smoke/shadow_smoke_5.mp4"}
  - {sample_id: "shadow_smoke_6", clip: "data/processed/transitions/shadow_smoke/shadow_smoke_6.mp4"}
  - {sample_id: "shadow_smoke_7", clip: "data/processed/transitions/shadow_smoke/shadow_smoke_7.mp4"}
  - {sample_id: "shadow_smoke_8", clip: "data/processed/transitions/shadow_smoke/shadow_smoke_8.mp4"}
  - {sample_id: "shadow_smoke_9", clip: "data/processed/transitions/shadow_smoke/shadow_smoke_9.mp4"}
inputs:
  num_clip_frames: 25
  start_clip_strength: 1.0
  end_clip_strength: 1.0
  prompt: "A floating black smoke transition between objects."
  negative_prompt: "blurry, distorted, low quality."
inference:
  max_area: 393216
  num_frames: 121
  frame_rate: 24.0
  num_inference_steps: 40
regeneration:
  num_steps: 40
regen_variants:
  - {name: "base_g0",  guidance_scale: 4.0, guide_weight: 0.0}
  - {name: "g0.8",     guidance_scale: 4.0, guide_weight: 0.8, schedule: "const"}
  - {name: "g1.0",     guidance_scale: 4.0, guide_weight: 1.0, schedule: "const"}
runtime:
  seed: 42
outputs:
  dir: "outputs/videos/exp_048_smoke_self_recon_inject"

# Pre-registered certification bars — machine-readable mirror of SPEC §6 (O3).
#
# 3.0.0 REVISION 2026-07-14, owner decisions at the draft.8 inspection
# (closed list, nothing else rides along). Exactly TWO bar edits, and both
# are OUTCOME-AWARE — the draft.8 numbers were on the table when the owner
# decided, so neither counts as pre-registration for the draft.8 data; they
# re-register for future runs, and the record states this in so many words:
#   (1) bar 1 keeps ONLY the d >= 1.5 conjunct. The accuracy conjunct
#       (>= 0.80) is DELETED: its floor was calibrated on the 47-clip /
#       11-style v2 corpus (chance 0.213) and was never re-derived for the
#       223-clip / 39-class exam (chance 0.067). The surviving d conjunct
#       was pre-registered in draft.7/draft.8 and passed there (d 1.522)
#       BEFORE this deletion. Accuracy remains reported, descriptive.
#   (2) draft.8's bars 2 and 3 MERGE into one bar 2 — they gated the same
#       inequality (sibling app_ref > control app_ref) from opposite sides.
#       Form: per n>=4-eligible class, sibling > control AND M2a silent on
#       the sibling; ALL eligible classes must pass (the old 35/37 and
#       37/39 count floors were arbitrary headroom; eligibility reuses the
#       exam's n>=4 trust convention). DISCLOSED PLAINLY: nature_bloom
#       (n=2), draft.8's only floor inversion and bar-2 miss, leaves the
#       denominator under this rule; its residual risk is documented in the
#       record's nature_bloom / lerp blind-spot note. core_degenerate is
#       removed from the certification bar path ENTIRELY — no conjunct, no
#       silent per-class logging (owner: it was smoke-only; dead code in a
#       certified instrument is worse than no code). The flag itself remains
#       a live output of S (row flag, mask-adoption criterion, Block C
#       descriptive rates) — those consumers are not certification gates.
# Draft.8 history (2026-07-13) retained in git; this file's draft.8 header
# documented the bar-3 conjunct removal and anchor dedup now folded above.
#
# ============================================================================
# 4.0.0 REVISION (2026-07-16) — new headline transfer metrics + a new bar 9.
# Advised campaign (operator/advisor; fable-advisor at xhigh made every call);
# owner authorized GO 2026-07-16 and delegated the two pre-declarations below.
# The headline transfer metrics are REPLACED (SPEC §3): M1a=S3 (4-channel
# appearance+dynamics ECDF composite), M1b=D_ZPR (3-view camera ECDF fusion),
# M1c=CSLS (de-hubbed object motion). They are corpus-relative (SPEC §4 amended:
# reference populations are pinned instrument constants). Changes here:
#   - DIRECT REPLACEMENT, no sign-test adoption (advisor F3a): the metrics were
#     adjudicated by the metric-search + health-validation campaigns under a
#     richer pre-registered process (simplicity ladder, two-arm causal gate,
#     three falsifiers, class-half stability) with committed reports; re-running
#     the weaker mechanical sign test whose outcome is already known would be
#     pre-registration theater, and the incumbent M1c FAILS the new causal gate
#     (a fluke sign-test miss would leave no valid metric on either side). The
#     `exam.variants`/`exam.adoption` block below is RETAINED for future
#     candidates but is NOT consulted by run_exam_v4. Incumbents are rescored
#     descriptively for the version bridge (non-gating).
#   - OUTCOME-AWARE, disclosed (v3.0.0 precedent): all exam-side quantities for
#     the shipped metrics were known before this freeze (health campaign panel).
#     bar1 (d>=1.5 on S3) and bar9 both pass foreknown; disclosed here + record.
#     The score.py-side outcomes (bar2 sibling>control under S3; bars 4-8) were
#     NOT computed under the new metrics before freeze — they are the real teeth.
#   - NEW bar 9 (bar9_causal): the two-arm causal-excess gate + negative
#     controls (below). bars 1,2,4-8 keep their forms and thresholds verbatim.
#   - F1a (owner-delegated, OUTCOME-AWARE): the DINO endpoint content baseline
#     GATES bar 9; the max-over-proxies excess ships as a mandatory NON-GATING
#     record field. Consequence disclosed: this is what lets M1c pass — excess
#     over DINO 0.156 vs over the color proxy 0.099 (the 0.10 bar). A gate needs
#     a pinned closed-form baseline; "strongest known proxy" is an open roster.
#   - F1b (owner-delegated): M1c ships HEADLINE with a scoped stamp (real but
#     faint; margin over strongest proxy at the practical bar), not demoted.
#   - tau_copy_initial -> 0.858 (owner-adopted operating value, amendment-1;
#     the frozen midpoint rule re-derives tau from this run's Block B regardless).
status: FROZEN
frozen: true      # 4.0.0 FROZEN 2026-07-16 in this own commit, AFTER advisor consult 2
                  # (GO) and BEFORE any score.py-side outcome (bars 2/4-8 genuinely
                  # unknown; bar1/bar9 are outcome-aware by V1/F1a design + disclosed).
                  # Changes henceforth = new draft version + full re-run (fail-forward).
                  # v3.0.0's lock stays on the eval/v3.0.0 tag.

principles:
  truth_only: "hard bars only on constructed or human-verified truth; model-behavior
    statements are descriptive, never gating"
  fail_forward: "failed cert -> diagnose -> new draft -> re-freeze -> full re-run"
  two_kind_calibration: "corpus-only calibration (fallback delta/k, reversal
    enumeration, sibling pair selection, anchor rule) may run pre-freeze;
    outcome-coupled calibration (tau_copy) runs post-freeze under the frozen
    midpoint rule"

exam:                                # Block A (SPEC 6.1)
  readouts:
    r1_clip_level:
      metrics: [m1a_appearance, m1b_camera, m1c_object]
      form: "LOO 1-NN retrieval + cohens_d; deployed clip-to-clip statistics, IMPORTED"
    r2_pool_level:
      metrics: [m2b_intrusion]
      form: "LOO class-pool margin classification via m2_integrity.intrusion_margin
        (clip excluded from its own pool). R1 trust does NOT transfer to M2b."
  trust:
    min_class_n: 4                   # n<4 auto-untrusted; singletons excluded, permanently untrusted
    trust_min_recall: 0.5            # v2 exam-validated convention (exp_053)
    m1c_min_definedness: 0.5         # recall over <half-defined same-class pairs is not trust
    min_ceiling_clips: 4             # carried from v2 (sibling-context eligibility)
  variants:
    core_mask: [v2_envelope, v3_sided, all_frames]
    motion: [v2_mfs_incumbent, v3_decomposed]
  adoption:                          # pre-registered; applied mechanically by exam.py
    form: "one-sided exact binomial sign test on per-class recall, n>=4 classes
      of the target stratum (one-sided classes for the mask; camera classes for
      motion); non-tied classes only"
    alpha: 0.05                      # standard; count-margin forms rejected as arbitrary
    overall_tolerance: 0.02          # ~4.5 clips of 223 — plausible retrieval noise
    regression_guard: "no previously-trusted class drops below trust_min_recall"
    mask_nondegenerate_min: 0.80     # real one-sided clips genuinely dissolve A; 20%
                                     # headroom for shallow/subtle effects (STRICT core)
    m1c_overall_guard_drop: 0.10     # decomposed M1c median recall on defined classes
                                     # may trail incumbent by at most this
    motion_contingency: "if v3_decomposed is not adopted, incumbent MFS ships as
      the single headline motion metric; M1b/M1c demote to analysis tier"
  o7_conditional: "median-trim is primary; Huber IRLS examined under the SAME
    adoption rule iff camera-stratum mean recall < trust_min_recall (new draft
    version; pre-registered secondary analysis; no other weighting schemes)"
  bar1_m1a_floor:                    # d ONLY (3.0.0, owner decision — see header).
    d_min: 1.5                       # pre-registered since draft.7; passed at 1.522
                                     # (v3) and again on S3 (v4, foreknown, disclosed).
                                     # Accuracy is reported descriptively, ungated.
  bar9_causal:                       # NEW 4.0.0 — the two-arm causal-excess gate
                                     # (SPEC §6.2), self-verifying via negative controls.
    form: "each headline metric (S3/D_ZPR/CSLS) passes the two-arm gate on its
      stratum AND all three negative controls (D_cont, pixel-color, random-D) FAIL
      the same gate on the same content galleries"
    gate: "causal_PASS iff causal_excess = Cn - Cn_B >= max(0.10, 2*null_std)
      AND paired-subsample lo95(controlled-mAP difference) > 0, baseline B = D_cont
      = 1 - content_sim(endpoint DINO). BOTH arms load-bearing — random-D passes
      the paired-CI arm; a sub-floor metric passes the excess arm — do NOT simplify
      to one arm (health-validated 2026-07-16; the old above-chance gate was a
      proven no-op for content-monotone metrics, demoted to descriptive)."
    baseline: dino_endpoint          # F1a: DINO gates; max-over-proxies is a
                                     # mandatory NON-GATING record field
                                     # (causal_excess_maxproxy). Disclosed outcome-
                                     # aware: DINO-gating is what lets M1c pass.
    excess_floor: 0.10               # max(0.10, 2*null_std); the practical bar
    negative_controls: [D_cont, pixel_color, random_D]  # must all FAIL (self-verify)
    n_perm: 1000                     # permutation null size (health-campaign setting)
    n_boot: 400                      # Politis-Romano subsample count
    m1c_scoped_stamp: "object-motion signal real but faint; excess over DINO 0.156,
      over the strongest content proxy (color) 0.099 — at the 0.10 practical bar
      (paired lo95 0.043 > 0). Ships headline WITH this stamp (F1b), not demoted."

probes:                              # Block B (SPEC 6.2) — all scored by score.py
  siblings:
    audit: all_within_class_pairs_n_ge_2   # cached-feature statistics -> content-
                                           # invariance audit (descriptive)
    bar_pair: max_endpoint_distance        # per class, deterministic from cached
                                           # features (corpus-only, pre-freeze)
    bar2:                            # MERGED draft.8 bars 2+3 (3.0.0, owner decision —
                                     # they gated the same inequality from both sides)
      form: "per n>=4-eligible class: sibling M1a > its control arm's M1a AND
        M2a silent (near_copy false) on the sibling; ALL eligible classes
        must pass — no count headroom"
      eligibility_min_n: 4           # the exam's existing trust convention; a 2-clip
                                     # class yields one pair, no distributional basis.
                                     # Ineligible classes stay scored + reported.
      loo_clause:                    # NEW 4.0.0 (advisor Q2) — leave-own-clip-out
                                     # robustness. S3 is corpus-relative (percentile),
                                     # so a sibling — a real corpus clip — draws an
                                     # in-sample ECDF boost (<=222/24753 ~= 0.9pp) that
                                     # could manufacture a PASS in S3's compressed
                                     # regime (exactly V1's named residual risk). The
                                     # clause re-scores each sibling through the
                                     # DEPLOYED m1a_pair kernel against M1a ECDF
                                     # populations with the sibling's own row/col
                                     # MASKED, and requires sibling_LOO app_ref >
                                     # control app_ref for ALL eligible classes. bar 2
                                     # PASS = base form AND loo_clause. Only the ECDF
                                     # populations are masked (the quantified leakage
                                     # channel); mu stays full-corpus (1/223, not the
                                     # leakage channel; disclosed). The control arm is
                                     # synthetic (out-of-sample) so it is unchanged.
                                     # Deployed lookup kernel reused (no kernel change),
                                     # so the F8 fallback margin rule is NOT invoked.
  controls:
    arms: {twosided: lerp, onesided: static_hold}
                                     # controls are construction spec; they are graded
                                     # inside bar2 (sibling > control), not separately
  copy_splices:
    construction: "reference NON-CORE frames into a centered gen-mid segment
      (core-frame splices sit outside M2a's comparison pool: pinned)"
    per_class: 1                     # 37 verbatim + 37 perturbed = 74 splices
    segment_frames: 24               # ~1s of literal copied content mid-video
    perturbation:                    # exactly ONE deterministic level (re-rendered proxy)
      crop_frac: 0.90                # center-crop to 90%, resize back
      color_gains: [1.08, 0.95, 1.02]  # fixed per-channel gains — no RNG anywhere
    honest_set: bar_pair_sibling_m2a # independent real footage provably does not
                                     # copy its reference; max-distance pairs avoid
                                     # shared-scene contamination
    tau_copy_initial: 0.858          # 4.0.0: owner-adopted operating value (amendment-1,
                                     # 2026-07-14; splice min 0.914 / honest max 0.802,
                                     # midpoint rule). The frozen midpoint rule below
                                     # re-derives tau from THIS run's Block B regardless;
                                     # the bar is on the gap, not this constant.
    bar4:
      detect_all: true               # 100% of splices, verbatim AND perturbed
      min_gap: 0.05                  # cosine units, splice_min - honest_max; a
                                     # touching-distributions midpoint is garbage
    tau_rule: "tau_copy := midpoint(splice_min, honest_max); SET here, TESTED by
      bar7; a bar7 miss = new draft version, never a tau nudge"
  reversal:
    eligibility: "camera-tagged bar pairs where BOTH clips are reversal-sensitive;
      sensitivity enumerated analytically from deployed trajectories
      (params negated + time-reversed) — corpus-only, pre-freeze"
    sensitivity_dtw_min: 0.5         # z-unit banded DTW of a clip vs its own reverse;
                                     # palindromic moves score ~0 and are excluded
    bar5:
      form: "cam_corr(gen, ref) > cam_corr(gen, reversed ref) per pair"
      n_signtest_min: 8              # >=8 pairs -> sign test; below, all must drop
      alpha: 0.05
  m3_panel:
    bar6_endpoint_swap:
      form: "true prefix_dino > wrong-CLASS prefix_dino (cross-class swaps only)"
      min_classes: 35                # of 37; coincidental first-frame resemblance headroom
    bar6_hard_cut:
      form: "constructed cut at the handoff fires max_seam_z > 3"
      min_classes: 35                # of 37

realism:                             # Block C (SPEC 6.3) — archives, descriptive
  bar7_copy_twins:
    flagged: "11/11"                 # human-verified copy-regime base twins (exp_057 §4a)
    flags: "near_copy OR max_seam_z > 3"
  descriptive_only: [per_arm_distributions, flag_rates, m2b_margins, v2_v3_bridge]
  exclusions: "unconvertible archived items are excluded LOUDLY and enumerated
    in the record — never silently dropped"

stability:                           # Block D (SPEC 6.4)
  bar8:
    no_crash: "every planned A-D item scores without crash; per-item ERROR
      ROWS (draft.8 isolation — one bad item no longer kills a stage's data)
      count against this clause exactly as crashes do"
    warm_max_abs_delta: 1.0e-6       # LPIPS is recomputed every run; strict byte
                                     # identity across GPU kernels is not a property
                                     # the instrument has (v2 twin-job precedent: 1e-7)
    anchors:
      n: 6
      rule: "deterministic picks, no cherry-surface: strata filled in order
        (two-sided, one-sided, camera), each taking the FIRST lexicographic
        n>=4 class NOT already picked (draft.8 dedup — draft.7's wording
        produced 5 ids and its own assertion refused), plus the two-sided
        sibling's lerp control, first exp_057 base item, first exp_057 ic item"
      reproduction_tolerance: 0.04   # raw units, fresh cache (exp_057 §4c precedent)
  calibration_outputs: [tau_copy, core_fallback_delta_k, sidedness_floors,
                        reversal_sensitive_set, sigma_seed]
  sigma_seed:
    items: 12
    seeds: 5
    arm: adapter                     # the decision-generating arm; base assumed
                                     # same-family, documented in the record
    df_statement: pooled             # ~48 df pooled; never imply stratified precision
    gates: first_model_report_not_tag

record:                              # certifications/v<X.Y>.md required contents
  required: [bars_sha, per_bar_verdicts, trust_map_recall_and_definedness,
             content_invariance_audit, archive_distributions, v2_v3_bridge,
             calibration_constants_with_provenance, anchor_values,
             corpus_hash_and_artifact_pointers, claims_paragraph_verbatim]
  content_invariance:
    form: "within-class partial corr of style-sim (deployed M1a on core frames)
      vs endpoint/content-sim, pooled after per-class centering, ALL sibling pairs"
    expectation: "~0 (DINO is content-heavy; M1a claims style)"
    alarm_level: 0.4                 # noted in record, NON-GATING
    gating: false

reference:                           # 4.0.0 — the corpus-relative reference artifact
                                     # (reference_v4.npz), a pinned instrument constant
                                     # (SPEC §4/§7; sha in versioning.PINS).
  rebuild_tol: 1.0e-6                # rebuilding the artifact from the pinned corpus
                                     # must reproduce the committed one within this
                                     # (gated inside bar 8; float-path tolerance —
                                     # the exact-EMD LP value is unique, DTW float32).
  contents: "mu, ECDF populations {P1,P2,V1,V1e,App,Dyn,Z,P,R}, CSLS r_obj[223],
    k_csls=10, rgrid, s3_app_weight — fitted once on the 223-clip corpus."

judge:
  certification: exempt              # advisory until human-calibrated (O9)
  human_bar: "Spearman >= 0.8 vs human labels on 50-100 items"

# Pre-registered certification bars — machine-readable mirror of SPEC §6 (O3).
#
# FORMS LOCKED 2026-07-13 after a three-pass design review; every number tagged
# DRAFT below is a placeholder. The freeze session sets the numbers and flips
# `frozen: true` in its own commit, BEFORE the first certification run executes
# (a bar set after seeing the outcome is not a bar). exam.py refuses to run
# while frozen is false. Failed cert -> new draft version; bars are never
# adjusted after an outcome.
status: FORMS_LOCKED_NUMBERS_DRAFT
frozen: false

principles:
  truth_only: "hard bars only on constructed or human-verified truth; model-behavior
    statements are descriptive, never gating"
  fail_forward: "failed cert -> diagnose -> new draft -> re-freeze -> full re-run"
  two_kind_calibration: "corpus-only calibration (delta/k, reversal enumeration,
    sibling pair selection) may run pre-freeze; outcome-coupled calibration
    (tau_copy) runs post-freeze under the frozen midpoint rule"

exam:                                # Block A (SPEC 6.1)
  readouts:
    r1_clip_level:
      metrics: [m1a_appearance, m1b_camera, m1c_object]
      form: "LOO 1-NN retrieval + cohens_d; deployed clip-to-clip statistics, IMPORTED"
    r2_pool_level:
      metrics: [m2b_intrusion]
      form: "LOO class-pool margin classification; deployed m2_integrity code,
        IMPORTED; clip excluded from its own pool. R1 trust does NOT transfer."
  trust:
    min_class_n: 4                   # n<4 auto-untrusted; 2 singletons excluded, permanently untrusted
    trust_min_recall: 0.5            # DRAFT (v2 exam-validated convention)
    m1c_min_definedness: 0.5         # DRAFT — min fraction of defined (non-NaN) same-class comparisons
    min_ceiling_clips: 4             # carried from v2 (sibling-context eligibility)
  variants:
    core_mask: [v2_envelope, v3_sided, all_frames]
    motion: [v2_mfs_incumbent, v3_decomposed]
  adoption:                          # pre-registered; applied mechanically
    form: "per-class sign test over n>=4 classes on per-class recall"
    net_wins_min: 4                  # DRAFT — wins minus losses among non-tied classes
    regression_guard: "no previously-trusted class drops below trust_min_recall"
    mask_nondegenerate_min: 0.80     # DRAFT — fraction of real one-sided clips with
                                     # non-degenerate cores under the winning mask
  o7_conditional: "median-trim is primary; Huber variant examined under the SAME
    adoption rule iff camera-stratum recall < trust_min_recall (pre-registered
    secondary analysis; no other weighting schemes)"
  bar1_m1a_floor:
    acc_min: 0.80                    # DRAFT (v2 precedent on this corpus: 0.851)
    d_min: 1.5                       # DRAFT (v2 precedent: ~2.2)

probes:                              # Block B (SPEC 6.2) — all scored by score.py
  siblings:
    scored: all_within_class_pairs_n_ge_2     # descriptive + content-invariance audit
    bar_pair: max_endpoint_distance           # per class, deterministic from cached
                                              # features (corpus-only, pre-freeze)
    bar2:
      form: "M1a > class control AND M2a silent (near_copy false) on the bar pair"
      min_classes: 35                # DRAFT — of 37 eligible (n>=2) classes
  controls:
    arms: {twosided: lerp, onesided: static_hold}
    bar3:
      form: "M1a at floor AND core_degenerate/timing flags fire"
      min_classes: 37                # DRAFT — of 39; misses documented, never rescued
  copy_splices:
    construction: "reference NON-CORE frames spliced into gen-mid (core-frame
      splices sit outside M2a's comparison pool and would fail spuriously)"
    per_class: 1                     # DRAFT
    perturbation:                    # exactly ONE level — re-rendered-copy proxy
      crop_frac: 0.90                # DRAFT
      color_jitter: 0.10             # DRAFT
    honest_set: sibling_m2a_distribution
    bar4:
      detect_all: true               # 100% of splices, verbatim AND perturbed, >= tau_copy
      min_gap: 0.05                  # DRAFT — cosine units, splice_min - honest_max
    tau_rule: "tau_copy := midpoint(splice_min, honest_max); SET here, TESTED in
      Block C bar7; a C miss = new draft version, never a tau nudge"
  reversal:
    eligibility: "pre-freeze corpus-only enumeration: clip self-reversal trajectory
      distance excludes palindromic camera moves from the denominator"
    bar5:
      form: "reversed-reference M1b drop on sensitive pairs; sign test if enumerated
        n powers p<0.05, else fixed k-of-m; frozen post-enumeration, pre-outcome"
      k_of_m: null                   # set at freeze, after enumeration
  m3_panel:
    bar6_endpoint_swap:
      form: "true prefix beats a wrong-CLASS prefix (cross-class swaps only)"
      min_frac: 0.95                 # DRAFT
    bar6_hard_cut:
      form: "constructed abrupt cut at handoff fires max_seam_z > 3"
      min_frac: 0.95                 # DRAFT

realism:                             # Block C (SPEC 6.3) — archives, descriptive
  bar7_copy_twins:
    flagged: "11/11"                 # human-verified copy-regime base twins (exp_057)
    flags: "near_copy OR max_seam_z > 3"
  descriptive_only: [per_arm_distributions, flag_rates, m2b_margins, v2_v3_bridge]
  note: "no bars on model behavior — core_degenerate on a generation that never
    departs A is the flag working"

stability:                           # Block D (SPEC 6.4)
  bar8:
    no_crash: "every planned A-D item scores without crash"
    warm_rerun: "items.jsonl byte-identical"
    anchors:
      n: 6                           # DRAFT — mix of siblings, archives, one control
      reproduction_tolerance: 0.04   # DRAFT — single tolerance, raw units, post cache-wipe
  calibration_outputs: [tau_copy, core_fallback_delta_k, sidedness_floors,
                        reversal_sensitive_set, sigma_seed]
  sigma_seed:
    items: 12
    seeds: 5
    arm: adapter                     # decision-generating arm; base assumed same-family, documented
    df_statement: pooled             # ~48 df pooled; never imply stratified precision
    gates: first_model_report_not_tag

record:                              # certifications/v<X.Y>.md required contents
  required: [bars_sha, per_bar_verdicts, trust_map_recall_and_definedness,
             content_invariance_audit, archive_distributions, v2_v3_bridge,
             calibration_constants_with_provenance, anchor_values,
             corpus_hash_and_artifact_pointers, claims_paragraph_verbatim]
  content_invariance:
    form: "within-class partial correlation of style-sim (core frames) vs
      endpoint/content-sim across ALL sibling pairs"
    expectation: "~0 (DINO is content-heavy; M1a claims style)"
    alarm_level: 0.4                 # DRAFT — noted in record, NON-GATING
    gating: false

judge:
  certification: exempt              # advisory until human-calibrated (O9)
  human_bar: "Spearman >= 0.8 vs human labels on 50-100 items"

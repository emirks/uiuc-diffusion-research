# Metric Workbench — frozen numeric gates (OPERATIONS §4 item 6).
#
# Machine-readable mirror of every number the RUNBOOK gates on, plus the
# conventions those numbers are stated against. The driver REFUSES to run any
# exam whose gates are not frozen (same reflex as certify/exam.py's frozen-bars
# check), and refuses E2/E3 unless E1's recorded verdict is a pass.
#
# FROZEN BEFORE ANY CANDIDATE COMPUTATION. No candidate descriptor, no candidate
# distance matrix, and no candidate exam existed when this file was committed.
# Changing any number here after a candidate has run is threshold-changing —
# owner-reserved (OPERATIONS §1 prohibition 5), and terminal for the track.
#
# Two-kind calibration (bars.yaml principle, inherited): corpus-only calibration
# (the hubness thresholds below, the min-D percentile, the stratum targets) may
# run pre-freeze because it is outcome-independent — it reads only the frozen
# corpus and the frozen incumbent matrices, never a candidate.

status: FROZEN
frozen: true
frozen_at: 2026-07-14
frozen_before: "any candidate descriptor, matrix, or exam"

# --- conventions the gates are stated against --------------------------------
# These are not stylistic. The kill rule (§4.1) and the adoption rule (§7) are
# stated against a `misretrieved` COUNT, and that count only reproduces the
# pinned 73/165/206 under one convention. Pinning it here stops a later
# comparison from quietly switching denominators and flattering a candidate.
conventions:
  misretrieved: |
    misretrieved := n_clips - n_correct. A clip whose row is UNCOVERED (all
    distances undefined -> the frozen kernel cannot retrieve for it) counts as
    misretrieved, not as excluded. Verified: this convention, and only this one,
    reproduces the pinned 73/223 (m1a__v3_sided), 165/223 (m1b_camera) and
    206/223 (m1c_object). Definedness never buys accuracy (RUNBOOK §1.5).
  accuracy: |
    accuracy_1nn is the frozen kernel's own — correct over COVERED rows. It is
    therefore a graded-denominator statistic while misretrieved is a
    total-denominator count; both are reported, never mixed.
  coverage: |
    Reported next to accuracy ALWAYS (§1.5). An accuracy win on a shrunken
    support is not a win.
  stratum_recall: |
    macro mean of per-class recall over (stratum INTERSECT n>=4-eligible), with
    a NaN class recall (no covered clips in that class) counted as 0.0, not
    dropped. Dropping would let a candidate raise its score by NaN-ing its
    hardest classes. On the incumbent both conventions agree to the last bit
    (no eligible class has NaN recall), so the pinned targets below are
    unaffected by the choice. Strata come from the MANIFEST tags — the source
    the deployed gating code (exam.adopt_motion) uses.
  class_scope: |
    All class-level gating restricted to n>=4-eligible classes (RUNBOOK §6).
    Singletons and n<=3 classes are scored and reported, never gating.

